<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パンフレット配布管理システム | 沖縄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ocean: #0099cc;
  --ocean-deep: #005f7f;
  --ocean-light: #e6f7ff;
  --coral: #ff6b4a;
  --coral-light: #fff0ec;
  --sand: #f5f0e8;
  --sand-dark: #e8e0cc;
  --forest: #2d7a4f;
  --forest-light: #e8f5ee;
  --amber: #f59e0b;
  --amber-light: #fffbeb;
  --slate: #1e293b;
  --slate-mid: #475569;
  --slate-light: #94a3b8;
  --white: #ffffff;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #e2e8f0;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--slate);
  min-height: 100vh;
  font-size: 14px;
}

/* ===== LOGIN ===== */
#loginScreen {
  min-height: 100vh;
  background: linear-gradient(135deg, #005f7f 0%, #0099cc 40%, #00b8d4 70%, #26c6da 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
#loginScreen::before {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -40px;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
#loginScreen::after {
  content: '';
  position: absolute;
  top: -60px;
  right: -80px;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
}
.loginCard {
  background: white;
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  position: relative;
  z-index: 1;
}
.loginLogo {
  text-align: center;
  margin-bottom: 32px;
}
.loginLogo .wave { font-size: 48px; }
.loginLogo h1 { font-size: 20px; font-weight: 700; color: var(--slate); margin-top: 12px; }
.loginLogo p { font-size: 12px; color: var(--slate-light); margin-top: 4px; }
.loginOptions { display: flex; gap: 12px; margin-bottom: 28px; }
.loginOption {
  flex: 1;
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  color: var(--slate-mid);
  transition: all 0.2s;
  background: white;
}
.loginOption.active { border-color: var(--ocean); background: var(--ocean-light); color: var(--ocean-deep); font-weight: 600; }
.loginOption:hover { border-color: var(--ocean); }
.pinInput { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
.pinDigit {
  width: 52px;
  height: 60px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--ocean-deep);
  outline: none;
  transition: all 0.2s;
  background: var(--bg);
}
.pinDigit:focus { border-color: var(--ocean); background: white; box-shadow: 0 0 0 3px rgba(0,153,204,0.15); }
.staffSelect {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--slate);
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  outline: none;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}
.staffSelect:focus { border-color: var(--ocean); background: white; }
.btnLogin {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--ocean-deep), var(--ocean));
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.btnLogin:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,99,153,0.3); }
.loginErr { color: var(--coral); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

/* ===== HEADER ===== */
#app { display: none; }
.header {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.headerLeft { display: flex; align-items: center; gap: 12px; }
.headerLogo { font-size: 16px; font-weight: 700; color: var(--ocean-deep); }
.headerUser {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}
.userBadge {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white;
}
.badge-admin { background: var(--coral); }
.badge-staff { background: var(--ocean); }
.btnLogout {
  padding: 6px 14px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  color: var(--slate-mid);
  font-family: 'Noto Sans JP', sans-serif;
}
.btnLogout:hover { background: var(--bg); }

/* ===== NAV ===== */
.nav {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.navItem {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--slate-mid);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
}
.navItem:hover { color: var(--ocean); }
.navItem.active { color: var(--ocean-deep); border-bottom-color: var(--ocean); font-weight: 600; }

/* ===== MAIN ===== */
.main { padding: 20px; max-width: 1400px; margin: 0 auto; }
.pageTitle { font-size: 22px; font-weight: 700; margin-bottom: 20px; color: var(--slate); }

/* ===== CARDS ===== */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  border: 1px solid var(--border);
}
.cardTitle { font-size: 15px; font-weight: 700; color: var(--slate); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* ===== STATS ===== */
.statsGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
.statCard {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.statLabel { font-size: 12px; color: var(--slate-light); font-weight: 500; margin-bottom: 8px; }
.statValue { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--slate); }
.statSub { font-size: 12px; color: var(--slate-light); margin-top: 4px; }
.statCard.ocean .statValue { color: var(--ocean-deep); }
.statCard.coral .statValue { color: var(--coral); }
.statCard.forest .statValue { color: var(--forest); }
.statCard.amber .statValue { color: var(--amber); }

/* ===== TABLE ===== */
.tableWrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg); padding: 10px 14px; text-align: left; font-weight: 600; color: var(--slate-mid); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* ===== BADGES ===== */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-done { background: var(--forest-light); color: var(--forest); }
.badge-pending { background: var(--coral-light); color: var(--coral); }
.badge-skip { background: var(--sand); color: var(--slate-mid); }
.badge-area1 { background: #e0f2fe; color: #0369a1; }
.badge-area2 { background: #fef3c7; color: #92400e; }
.badge-area3 { background: #f0fdf4; color: #166534; }
.badge-area4 { background: #fdf4ff; color: #7e22ce; }
.badge-area5 { background: #fff1f2; color: #be123c; }

/* ===== BUTTONS ===== */
.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--ocean); color: white; }
.btn-primary:hover { background: var(--ocean-deep); }
.btn-coral { background: var(--coral); color: white; }
.btn-coral:hover { opacity: 0.9; }
.btn-forest { background: var(--forest); color: white; }
.btn-forest:hover { opacity: 0.9; }
.btn-outline { background: white; color: var(--slate); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-lg { padding: 12px 24px; font-size: 15px; }

/* ===== FORMS ===== */
.formGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
.formGroup { display: flex; flex-direction: column; gap: 6px; }
.formLabel { font-size: 12px; font-weight: 600; color: var(--slate-mid); }
.formInput, .formSelect {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--slate);
  background: white;
  outline: none;
  transition: border-color 0.2s;
}
.formInput:focus, .formSelect:focus { border-color: var(--ocean); }

/* ===== AREA FILTER ===== */
.areaFilters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.areaBtn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.areaBtn-all { background: var(--slate); color: white; }
.areaBtn-1 { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
.areaBtn-2 { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
.areaBtn-3 { background: #f0fdf4; color: #166534; border-color: #86efac; }
.areaBtn-4 { background: #fdf4ff; color: #7e22ce; border-color: #d8b4fe; }
.areaBtn-5 { background: #fff1f2; color: #be123c; border-color: #fda4af; }
.areaBtn.active { box-shadow: 0 2px 8px rgba(0,0,0,0.15); transform: translateY(-1px); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 20px;
  display: none;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 20px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: white;
  padding-top: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--slate-light); padding: 4px; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* ===== UPLOAD AREA ===== */
.uploadArea {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg);
}
.uploadArea:hover { border-color: var(--ocean); background: var(--ocean-light); }
.uploadArea .icon { font-size: 32px; margin-bottom: 8px; }
.uploadArea p { font-size: 13px; color: var(--slate-mid); }
.photoGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
.photoThumb {
  aspect-ratio: 1;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--slate-light);
}
.photoThumb img { width: 100%; height: 100%; object-fit: cover; }
.photoThumb .del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ===== PROGRESS BAR ===== */
.progressBar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}
.progressFill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
.progress-ocean { background: linear-gradient(90deg, var(--ocean-deep), var(--ocean)); }
.progress-forest { background: linear-gradient(90deg, #166534, var(--forest)); }
.progress-coral { background: linear-gradient(90deg, #be123c, var(--coral)); }

/* ===== FACILITY CARD (mobile) ===== */
.facilityList { display: flex; flex-direction: column; gap: 10px; }
.facilityCard {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.facilityCard:hover { box-shadow: var(--shadow-lg); }
.facilityCard.done { border-left: 4px solid var(--forest); }
.facilityCard.pending { border-left: 4px solid var(--coral); }
.facilityCard.skip { border-left: 4px solid var(--sand-dark); opacity: 0.7; }
.fcTop { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.fcName { font-weight: 700; font-size: 14px; color: var(--slate); }
.fcMeta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.fcTag { font-size: 11px; color: var(--slate-light); display: flex; align-items: center; gap: 4px; }
.fcActions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

/* ===== SCHEDULE CALENDAR ===== */
.calGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.calDay { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; border: 1px solid transparent; }
.calDay.today { background: var(--ocean); color: white; }
.calDay.hasSchedule { background: var(--ocean-light); color: var(--ocean-deep); border-color: var(--ocean); font-weight: 700; }
.calDay.available { background: var(--forest-light); color: var(--forest); }
.calDay.unavailable { background: var(--coral-light); color: var(--coral); }
.calDay:hover:not(.today) { background: var(--bg); }
.calHeader { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
.calDayLabel { text-align: center; font-size: 11px; font-weight: 600; color: var(--slate-light); }

/* ===== MAP ROUTE ===== */
.routeList { display: flex; flex-direction: column; gap: 0; }
.routeItem { display: flex; gap: 12px; align-items: flex-start; }
.routeLine { display: flex; flex-direction: column; align-items: center; }
.routeDot { width: 12px; height: 12px; border-radius: 50%; background: var(--ocean); border: 2px solid white; box-shadow: 0 0 0 2px var(--ocean); flex-shrink: 0; margin-top: 3px; }
.routeConnector { width: 2px; flex: 1; background: var(--border); min-height: 20px; }
.routeInfo { padding-bottom: 16px; flex: 1; }
.routeName { font-weight: 600; font-size: 13px; color: var(--slate); }
.routeAddr { font-size: 11px; color: var(--slate-light); margin-top: 2px; }

/* ===== NOTIFICATION ===== */
.notifBell { position: relative; }
.notifCount {
  position: absolute; top: -6px; right: -6px;
  background: var(--coral); color: white;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.notifList { display: flex; flex-direction: column; gap: 8px; }
.notifItem { padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); font-size: 13px; }
.notifItem.unread { background: var(--ocean-light); border-color: var(--ocean); }

/* ===== REPORT ===== */
.reportSection { margin-bottom: 24px; }
.reportSection h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* ===== TABS ===== */
.tabs { display: flex; gap: 2px; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
.tab { flex: 1; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; color: var(--slate-mid); transition: all 0.2s; }
.tab.active { background: white; color: var(--ocean-deep); box-shadow: var(--shadow); }

/* ===== STAFF CARD ===== */
.staffGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.staffCard {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.staffAvatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 12px; }
.staffName { font-weight: 700; font-size: 15px; color: var(--slate); }
.staffMeta { font-size: 12px; color: var(--slate-light); margin-top: 4px; }
.staffStatus { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; }
.statusDot { width: 8px; height: 8px; border-radius: 50%; }
.statusDot.online { background: var(--forest); }
.statusDot.offline { background: var(--slate-light); }

/* ===== GENRE TABS ===== */
.genreTabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.genreTab { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--slate-mid); transition: all 0.2s; }
.genreTab.active { background: var(--ocean); color: white; border-color: var(--ocean); }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .main { padding: 12px; }
  .statsGrid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .statValue { font-size: 24px; }
  .formGrid { grid-template-columns: 1fr; }
  .loginCard { padding: 32px 24px; }
  .header { padding: 0 12px; }
  .headerLogo { font-size: 14px; }
}

/* ===== PAGE SECTIONS ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== SEARCH ===== */
.searchBar { position: relative; margin-bottom: 16px; }
.searchBar input { width: 100%; padding: 10px 14px 10px 40px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; background: white; transition: border-color 0.2s; }
.searchBar input:focus { border-color: var(--ocean); }
.searchBar .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--slate-light); }

.twoCol { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .twoCol { grid-template-columns: 1fr; } }

.separator { height: 1px; background: var(--border); margin: 16px 0; }
.sectionNote { font-size: 12px; color: var(--slate-light); margin-bottom: 12px; }
.infoRow { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.infoRow:last-child { border-bottom: none; }
.infoLabel { color: var(--slate-mid); font-weight: 500; }
.infoVal { font-weight: 600; color: var(--slate); }

.alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
.alert-info { background: var(--ocean-light); color: var(--ocean-deep); border: 1px solid #7dd3fc; }
.alert-warn { background: var(--amber-light); color: #92400e; border: 1px solid #fcd34d; }

input[type=file] { display: none; }
.fileLabel { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--slate-mid); background: white; transition: all 0.2s; }
.fileLabel:hover { border-color: var(--ocean); color: var(--ocean); }

function loadState() {
  try {
    const saved = localStorage.getItem('pamph_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = {...state, ...parsed};
    }
  } catch(e) {}
  if (!state.facilities || state.facilities.length === 0) {
    state.facilities = INITIAL_FACILITIES.map(f => ({
      ...f,
      zone: getAreaZone(f.area1, f.area2),
      status: 'pending',
      lastDone: null,
    }));
  }
  if (!state.staff || state.staff.length === 0) {
    state.staff = [
      {id:'s001', name:'田中 健一', pin:'1234', car:'沖縄 300 あ 1111', fuel:15.0, zone:'1', emoji:'🧑', online:true},
      {id:'s002', name:'山城 美咲', pin:'2345', car:'沖縄 300 い 2222', fuel:14.5, zone:'2', emoji:'👩', online:false},
      {id:'s003', name:'新垣 太郎', pin:'3456', car:'沖縄 300 う 3333', fuel:16.0, zone:'3', emoji:'👨', online:true},
      {id:'s004', name:'宮城 花子', pin:'4567', car:'沖縄 300 え 4444', fuel:13.5, zone:'4', emoji:'👱', online:false},
    ];
  }
  if (!state.notifications) state.notifications = [
    {id:'n1', text:'田中 健一 が配達を開始しました', time:'09:15', unread:true},
    {id:'n2', text:'新垣 太郎 がエリア3 配達完了を報告', time:'13:42', unread:true},
    {id:'n3', text:'宮城 花子 が4/15 出勤可能を回答', time:'昨日', unread:false},
  ];
  if (!state.deliveries) state.deliveries = [];
  if (!state.schedules) state.schedules = [];
  if (!state.availability) state.availability = {};
  
  // Auto-reset completed facilities after 14 days
  const now = new Date();
  state.facilities.forEach(f => {
    if (f.status === 'done' && f.lastDone) {
      const done = new Date(f.lastDone);
      const diff = (now - done) / (1000*60*60*24);
      if (diff >= 14) { f.status = 'pending'; f.lastDone = null; }
    }
  });
}

function saveState() {
  try {
    const toSave = {...state, currentUser: null};
    localStorage.setItem('pamph_state', JSON.stringify(toSave));
  } catch(e) {}
}

// LOGIN
// ============================================================
let loginType = 'admin';

function setLoginType(t) {
  loginType = t;
  document.getElementById('optAdmin').classList.toggle('active', t==='admin');
  document.getElementById('optStaff').classList.toggle('active', t==='staff');
  document.getElementById('staffSelectWrap').style.display = t==='staff' ? 'block' : 'none';
  if (t==='staff') {
    const sel = document.getElementById('staffPicker');
    sel.innerHTML = '<option value="">担当者を選択してください</option>';
    state.staff.forEach(s => {
      sel.innerHTML += `<option value="${s.id}">${s.emoji||'👤'} ${s.name}</option>`;
    });
  }
}

function setupPinInputs() {
  const ids = ['p1','p2','p3','p4'];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      el.value = el.value.replace(/\D/,'');
      if (el.value && i < 3) document.getElementById(ids[i+1]).focus();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !el.value && i > 0) document.getElementById(ids[i-1]).focus();
    });
  });
}

function getPin() {
  return ['p1','p2','p3','p4'].map(id => document.getElementById(id).value).join('');
}

function clearPin() {
  ['p1','p2','p3','p4'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('p1').focus();
}

function doLogin() {
  const pin = getPin();
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  if (loginType === 'admin') {
    if (pin === '1116') {
      state.currentUser = {type:'admin', name:'管理者', id:'admin'};
      enterApp();
    } else {
      err.style.display = 'block'; clearPin();
    }
  } else {
    const staffId = document.getElementById('staffPicker').value;
    if (!staffId) { err.textContent = '担当者を選択してください'; err.style.display = 'block'; return; }
    const staff = state.staff.find(s => s.id === staffId);
    if (staff && staff.pin === pin) {
      state.currentUser = {type:'staff', name:staff.name, id:staff.id, emoji:staff.emoji};
      enterApp();
    } else {
      err.textContent = 'PINコードが違います'; err.style.display = 'block'; clearPin();
    }
  }
}

function doLogout() {
  state.currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  clearPin();
  setLoginType('admin');
}

  const nav = document.getElementById('mainNav');
  nav.innerHTML = pages.map(p =>
    `<div class="navItem" id="nav-${p.id}" onclick="showPage('${p.id}')">${p.label}</div>`
  ).join('');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.navItem').forEach(n => n.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  const nav = document.getElementById(`nav-${id}`);
  if (page) page.classList.add('active');
  if (nav) nav.classList.add('active');
  renderPage(id);
}

function renderPage(id) {
  switch(id) {
    case 'dashboard': renderDashboard(); break;
    case 'facilities': renderFacilities(); break;
    case 'staff': renderStaff(); break;
    case 'schedule': renderSchedule(); break;
    case 'delivery': renderDelivery(); break;
    case 'route': renderRoute(); break;
    case 'reports': renderReports(); break;
    case 'availability': renderAvailability(); break;
  }
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const total = state.facilities.length;
  const done = state.facilities.filter(f=>f.status==='done').length;
  const pending = state.facilities.filter(f=>f.status==='pending').length;
  const activeStaff = state.staff.filter(s=>s.online).length;
  const pct = total>0 ? Math.round(done/total*100) : 0;

  document.getElementById('dashStats').innerHTML = `
    <div class="statCard ocean"><div class="statLabel">登録施設数</div><div class="statValue">${total}</div><div class="statSub">件</div></div>
    <div class="statCard forest"><div class="statLabel">配布完了</div><div class="statValue">${done}</div><div class="statSub">件 (${pct}%)</div></div>
    <div class="statCard coral"><div class="statLabel">未完了</div><div class="statValue">${pending}</div><div class="statSub">件</div></div>
    <div class="statCard amber"><div class="statLabel">本日稼働</div><div class="statValue">${activeStaff}</div><div class="statSub">名</div></div>
  `;

  // Area progress
  const areaHtml = [1,2,3,4,5].map(z => {
    const facs = state.facilities.filter(f => f.zone === String(z));
    const d = facs.filter(f=>f.status==='done').length;
    const t = facs.length;
    const p = t>0 ? Math.round(d/t*100) : 0;
    const colors = ['ocean','amber','forest','purple','coral'];
    return `<div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:600;">${AREA_NAMES[z]}</span>
        <span style="font-size:12px;color:var(--slate-light);">${d}/${t}件</span>
      </div>
      <div class="progressBar"><div class="progressFill progress-${['ocean','forest','ocean','coral','forest'][z-1]}" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('areaProgress').innerHTML = areaHtml;

  // Notifications
  document.getElementById('notifList').innerHTML = state.notifications.slice(0,5).map(n =>
    `<div class="notifItem ${n.unread?'unread':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <span>${n.text}</span>
        <span style="font-size:11px;color:var(--slate-light);white-space:nowrap;margin-left:8px;">${n.time}</span>
      </div>
    </div>`
  ).join('') || '<p style="color:var(--slate-light);font-size:13px;">通知なし</p>';

  // Today schedule
  const todaySched = state.schedules.filter(s => s.date === state.today);
  if (todaySched.length === 0) {
    document.getElementById('todaySchedule').innerHTML = '<p style="color:var(--slate-light);font-size:13px;">本日のスケジュールはありません</p>';
    if (state.currentUser.type === 'admin') {
      document.getElementById('todaySchedule').innerHTML += `<button class="btn btn-primary" style="margin-top:12px;" onclick="openScheduleModal()">＋ スケジュールを作成</button>`;
    }
  } else {
    document.getElementById('todaySchedule').innerHTML = `<div class="tableWrap"><table>
      <thead><tr><th>担当者</th><th>エリア</th><th>メモ</th><th>回答</th></tr></thead>
      <tbody>${todaySched.map(s => {
        const staff = state.staff.find(st=>st.id===s.staffId);
        return `<tr>
          <td>${staff?.emoji||'👤'} ${staff?.name||'不明'}</td>
          <td><span class="badge badge-area${s.zoneId}">${AREA_NAMES[s.zoneId]||''}</span></td>
          <td>${s.note||'-'}</td>
          <td><span class="badge ${s.response==='ok'?'badge-done':s.response==='ng'?'badge-pending':'badge-skip'}">${s.response==='ok'?'対応可':s.response==='ng'?'対応不可':'未回答'}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }
}

// FACILITIES
// ============================================================
function renderFacilities() {
  // Genre tabs
  const genres = [{id:'all',label:'すべて'},{id:'hotel',label:'🏨 ホテル'},{id:'rental',label:'🚗 レンタカー'},{id:'michi',label:'🌳 道の駅・観光'},{id:'other',label:'その他'}];
  document.getElementById('genreTabs').innerHTML = genres.map(g =>
    `<div class="genreTab ${state.filterGenre===g.id?'active':''}" onclick="setGenreFilter('${g.id}')">${g.label}</div>`
  ).join('');

  // Area filter buttons
  const areas = [{id:'all',label:'すべてのエリア',cls:'areaBtn-all'},...[1,2,3,4,5].map(i=>({id:String(i),label:AREA_NAMES[i],cls:`areaBtn-${i}`}))];
  document.getElementById('areaFilterBtns').innerHTML = areas.map(a =>
    `<div class="areaBtn ${a.cls} ${state.filterArea===a.id?'active':''}" onclick="setAreaFilter('${a.id}')">${a.label}</div>`
  ).join('');

  const q = (document.getElementById('facilSearch')?.value||'').toLowerCase();
  let facs = state.facilities;
  if (state.filterGenre !== 'all') facs = facs.filter(f=>f.genre===state.filterGenre);
  if (state.filterArea !== 'all') facs = facs.filter(f=>f.zone===state.filterArea);
  if (q) facs = facs.filter(f=>(f.name||'').toLowerCase().includes(q)||(f.address||'').toLowerCase().includes(q));

  const total = facs.length, done = facs.filter(f=>f.status==='done').length, pend = facs.filter(f=>f.status==='pending').length;
  document.getElementById('facilitiesContainer').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
      <span class="badge badge-done">完了 ${done}件</span>
      <span class="badge badge-pending">未完了 ${pend}件</span>
      <span class="badge badge-skip">合計 ${total}件</span>
    </div>
    <div class="tableWrap">
      <table>
        <thead><tr><th>No</th><th>施設名</th><th>エリア</th><th>ジャンル</th><th>住所</th><th>状況</th><th>操作</th></tr></thead>
        <tbody>${facs.map((f,i) => {
          const zoneClass = `badge-area${f.zone}`;
          const statusBadge = f.status==='done'?'<span class="badge badge-done">完了</span>':f.status==='skip'?'<span class="badge badge-skip">不要</span>':'<span class="badge badge-pending">未完了</span>';
          const genreLabel = {hotel:'🏨 ホテル',rental:'🚗 レンタカー',michi:'🌳 道の駅',other:'その他'}[f.genre]||f.genre;
          return `<tr>
            <td style="color:var(--slate-light);font-family:'DM Mono',monospace;">${i+1}</td>
            <td style="font-weight:600;">${f.name}</td>
            <td><span class="badge ${zoneClass}">${AREA_NAMES[f.zone]||f.zone}</span></td>
            <td style="font-size:12px;">${genreLabel}</td>
            <td style="font-size:12px;color:var(--slate-mid);">${f.address||'-'}</td>
            <td>${statusBadge}${f.lastDone?`<div style="font-size:10px;color:var(--slate-light);">完了:${f.lastDone}</div>`:''}</td>
            <td>
              <div style="display:flex;gap:4px;">
                <button class="btn btn-outline btn-sm" onclick="editFacility('${f.id}')">編集</button>
                <button class="btn btn-forest btn-sm" onclick="markFacility('${f.id}','done')">完了</button>
                <button class="btn btn-coral btn-sm" onclick="markFacility('${f.id}','pending')">未完了</button>
              </div>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

function setGenreFilter(g) { state.filterGenre = g; renderFacilities(); }
function setAreaFilter(a) { state.filterArea = a; renderFacilities(); }

function markFacility(id, status) {
  const f = state.facilities.find(f=>f.id===id);
  if (f) {
    f.status = status;
    f.lastDone = status === 'done' ? state.today : null;
    saveState();
    renderFacilities();
  }
}

function openAddFacility() {
  state.selectedFacilityEdit = null;
  document.getElementById('facilityModalTitle').textContent = '施設追加';
  ['fac_name','fac_area1','fac_area2','fac_address','fac_tel'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fac_genre').value='hotel';
  document.getElementById('fac_rack').value='ラック';
  document.getElementById('fac_zone').value='1';
  openModal('facilityModal');
}

function editFacility(id) {
  const f = state.facilities.find(f=>f.id===id);
  if (!f) return;
  state.selectedFacilityEdit = id;
  document.getElementById('facilityModalTitle').textContent = '施設編集';
  document.getElementById('fac_name').value = f.name||'';
  document.getElementById('fac_area1').value = f.area1||'';
  document.getElementById('fac_area2').value = f.area2||'';
  document.getElementById('fac_address').value = f.address||'';
  document.getElementById('fac_tel').value = f.tel||'';
  document.getElementById('fac_genre').value = f.genre||'hotel';
  document.getElementById('fac_rack').value = f.rack||'ラック';
  document.getElementById('fac_zone').value = f.zone||'1';
  openModal('facilityModal');
}

function saveFacility() {
  const data = {
    name: document.getElementById('fac_name').value.trim(),
    area1: document.getElementById('fac_area1').value.trim(),
    area2: document.getElementById('fac_area2').value.trim(),
    address: document.getElementById('fac_address').value.trim(),
    tel: document.getElementById('fac_tel').value.trim(),
    genre: document.getElementById('fac_genre').value,
    rack: document.getElementById('fac_rack').value,
    zone: document.getElementById('fac_zone').value,
  };
  if (!data.name) { alert('施設名を入力してください'); return; }
  if (state.selectedFacilityEdit) {
    const f = state.facilities.find(f=>f.id===state.selectedFacilityEdit);
    if (f) Object.assign(f, data);
  } else {
    state.facilities.push({id:'f'+Date.now(), ...data, status:'pending', lastDone:null});
  }
  saveState(); closeModal('facilityModal'); renderFacilities();
}

}

  const date = document.getElementById('sch_date').value;
  const zoneId = document.getElementById('sch_zone').value;

  state.schedules = state.schedules.filter(s=>s.id!==id);

// ============================================================
// DELIVERY (Staff)
// ============================================================
function renderDelivery() {
  const uid = state.currentUser.id;
  const staff = state.staff.find(s=>s.id===uid);
  const zone = staff?.zone;
  const todaySched = state.schedules.find(s=>s.staffId===uid && s.date===state.today);
  const activeZone = todaySched?.zoneId || zone;

  const zoneFacs = state.facilities.filter(f => f.zone === activeZone);
  const pendingFacs = zoneFacs.filter(f => f.status !== 'done');
  
  // Find active delivery log
  const todayDelivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);

  let html = '';
  if (!todayDelivery || !todayDelivery.started) {
    html += `<div class="alert alert-info">本日の担当エリア: <strong>${AREA_NAMES[activeZone]||'未設定'}</strong> / 巡回施設: <strong>${pendingFacs.length}件</strong></div>
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="btn btn-forest btn-lg" onclick="openModal('startDeliveryModal')">🚗 配達を開始する</button>
    </div>`;
  } else if (todayDelivery.started && !todayDelivery.ended) {
    const completed = (todayDelivery.reports||[]).filter(r=>r.status==='done').length;
    html += `<div class="alert alert-info">🚗 配達中 | 完了: <strong>${completed}</strong>/${pendingFacs.length}件
      <button class="btn btn-coral btn-sm" style="margin-left:12px;" onclick="openModal('endDeliveryModal')">🏁 配達終了</button>
    </div>`;
  } else {
    html += `<div class="alert alert-info">🏁 本日の配達完了！ お疲れ様でした。</div>`;
  }

  html += `<div class="facilityList">${pendingFacs.map(f => {
    const rep = todayDelivery?.reports?.find(r=>r.facId===f.id);
    const statusClass = rep ? (rep.status==='done'?'done':rep.status==='skip'?'skip':'pending') : '';
    return `<div class="facilityCard ${statusClass}">
      <div class="fcTop">
        <div>
          <div class="fcName">${f.name}</div>
          <div class="fcMeta">
            <span class="fcTag">📍 ${f.area2||f.area1}</span>
            <span class="fcTag badge badge-area${f.zone}">${AREA_NAMES[f.zone]||''}</span>
            <span class="fcTag">🔧 ${f.rack}</span>
          </div>
          ${f.address?`<div class="fcTag" style="margin-top:4px;">📮 ${f.address}</div>`:''}
        </div>
        ${rep ? `<div class="completeCheckAnim">${rep.status==='done'?'✓':rep.status==='skip'?'→':'✗'}</div>` : ''}
      </div>
      <div class="fcActions">
        <button class="btn btn-primary btn-sm" onclick="openCheckIn('${f.id}')">📝 報告</button>
        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.address||f.name+' 沖縄')}" target="_blank" class="btn btn-outline btn-sm">🗺️ MAP</a>
      </div>
    </div>`;
  }).join('')}</div>`;

  document.getElementById('deliveryContent').innerHTML = html;
}

function startDelivery() {
  const uid = state.currentUser.id;
  const startKm = document.getElementById('startKm').value;
  const startTime = document.getElementById('startTime').value;
  const existing = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);
  if (existing) {
    existing.started = true;
    existing.startKm = startKm;
    existing.startTime = startTime;
  } else {
    state.deliveries.push({id:'d'+Date.now(), staffId:uid, date:state.today, started:true, ended:false, startKm, startTime, endKm:'', endTime:'', reports:[], tollPhotos:[]});
  }
  const staffIdx = state.staff.findIndex(s=>s.id===uid);
  if (staffIdx>=0) state.staff[staffIdx].online = true;
  addNotif(`${state.currentUser.name} が配達を開始しました`);
  saveState(); closeModal('startDeliveryModal'); renderDelivery();
}

function endDelivery() {
  const uid = state.currentUser.id;
  const endKm = document.getElementById('endKm').value;
  const endTime = document.getElementById('endTime').value;
  const delivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);
  if (delivery) {
    delivery.ended = true;
    delivery.endKm = endKm;
    delivery.endTime = endTime;
  }
  const staffIdx = state.staff.findIndex(s=>s.id===uid);
  if (staffIdx>=0) state.staff[staffIdx].online = false;
  addNotif(`${state.currentUser.name} が配達を完了しました`);
  saveState(); closeModal('endDeliveryModal'); renderDelivery();
}

function openCheckIn(facId) {
  state.checkInFacId = facId;
  state.checkInStatus = null;
  const f = state.facilities.find(f=>f.id===facId);
  document.getElementById('checkInTitle').textContent = `📝 ${f?.name||'施設'} 報告`;
  document.getElementById('checkInNote').value = '';
  document.getElementById('statusSelected').textContent = '未選択';
  document.getElementById('rackPhotos').innerHTML = '';
  document.getElementById('receiptPhotos').innerHTML = '';
  openModal('checkInModal');
}

function setStatus(s) {
  state.checkInStatus = s;
  const labels = {done:'✅ 補充完了',skip:'⏭️ 補充不要',pending:'❌ 未完了'};
  document.getElementById('statusSelected').textContent = labels[s]||s;
}

function saveCheckIn() {
  if (!state.checkInStatus) { alert('補充状況を選択してください'); return; }
  const uid = state.currentUser.id;
  let delivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);
  if (!delivery) {
    delivery = {id:'d'+Date.now(), staffId:uid, date:state.today, started:true, ended:false, reports:[]};
    state.deliveries.push(delivery);
  }
  if (!delivery.reports) delivery.reports = [];
  const existing = delivery.reports.findIndex(r=>r.facId===state.checkInFacId);
  const rep = {facId:state.checkInFacId, status:state.checkInStatus, note:document.getElementById('checkInNote').value};
  if (existing >= 0) delivery.reports[existing] = rep;
  else delivery.reports.push(rep);

  // Update facility status
  const f = state.facilities.find(f=>f.id===state.checkInFacId);
  if (f) {
    f.status = state.checkInStatus;
    if (state.checkInStatus === 'done') f.lastDone = state.today;
  }
  saveState(); closeModal('checkInModal'); renderDelivery();
}

// ============================================================
// ROUTE
// ============================================================
function renderRoute() {
  const isAdmin = state.currentUser.type === 'admin';
  let zoneId = isAdmin ? '1' : (state.staff.find(s=>s.id===state.currentUser.id)?.zone || '1');
  const facs = state.facilities.filter(f=>f.zone===zoneId && f.status!=='done');
  
  document.getElementById('routeContent').innerHTML = `
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <div class="formGroup">
          <label class="formLabel">エリア選択</label>
          <select class="formSelect" id="routeZone" onchange="renderRoute()">
            ${[1,2,3,4,5].map(z=>`<option value="${z}" ${zoneId===String(z)?'selected':''}>${AREA_NAMES[z]}</option>`).join('')}
          </select>
        </div>
        <div style="align-self:flex-end;">
          <a href="${buildGoogleMapsUrl(facs)}" target="_blank" class="btn btn-primary">🗺️ Googleマップで開く</a>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="cardTitle">📍 巡回ルート（未完了施設 ${facs.length}件）</div>
      <div class="routeList">
        ${facs.map((f,i) => `
          <div class="routeItem">
            <div class="routeLine">
              <div class="routeDot" style="background:${i===0?'var(--forest)':i===facs.length-1?'var(--coral)':'var(--ocean)'}"></div>
              ${i < facs.length-1 ? '<div class="routeConnector"></div>' : ''}
            </div>
            <div class="routeInfo">
              <div class="routeName">${i+1}. ${f.name}</div>
              <div class="routeAddr">${f.address||f.area2||''} · <span class="badge badge-area${f.zone}" style="font-size:10px;">${AREA_NAMES[f.zone]||''}</span></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function buildGoogleMapsUrl(facs) {
  if (facs.length === 0) return 'https://maps.google.com';
  const addresses = facs.slice(0,10).map(f=>encodeURIComponent(f.address||f.name));
  if (addresses.length === 1) return `https://www.google.com/maps/search/?api=1&query=${addresses[0]}`;
  const origin = addresses[0];
  const dest = addresses[addresses.length-1];
  const waypoints = addresses.slice(1,-1).join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}`;
  if (waypoints) url += `&waypoints=${waypoints}`;
  return url;
}

// ============================================================
// REPORTS
// ============================================================
function renderReports() {
  const uid = state.currentUser.id;
  const isAdmin = state.currentUser.type === 'admin';
  const deliveries = isAdmin ? state.deliveries : state.deliveries.filter(d=>d.staffId===uid);
  const sorted = [...deliveries].sort((a,b)=>a.date>b.date?-1:1);

  document.getElementById('reportsContent').innerHTML = `
    <div class="card">
      <div class="cardTitle">日報一覧</div>
      ${sorted.length===0 ? '<p style="color:var(--slate-light);font-size:13px;">日報なし</p>' :
      sorted.map(d => {
        const staff = state.staff.find(s=>s.id===d.staffId);
        const reports = d.reports||[];
        const done = reports.filter(r=>r.status==='done').length;
        const km = (parseFloat(d.endKm)||0) - (parseFloat(d.startKm)||0);
        const staffObj = staff;
        const fuelCost = staffObj ? Math.round(km / (staffObj.fuel||15) * FUEL_PRICE) : 0;
        const zone = state.schedules.find(s=>s.staffId===d.staffId&&s.date===d.date)?.zoneId || staffObj?.zone;
        return `<div class="facilityCard" style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
            <div>
              <div style="font-weight:700;font-size:15px;">📅 ${d.date}</div>
              <div style="font-size:13px;color:var(--slate-mid);margin-top:4px;">${staff?.emoji||'👤'} ${staff?.name||'不明'} ／ <span class="badge badge-area${zone||'1'}">${AREA_NAMES[zone]||''}</span></div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="printReport('${d.id}')">🖨️ PDF出力</button>
          </div>
          <div class="separator"></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;">
            <div class="infoRow"><span class="infoLabel">出発</span><span class="infoVal">${d.startTime||'-'}</span></div>
            <div class="infoRow"><span class="infoLabel">終了</span><span class="infoVal">${d.endTime||'-'}</span></div>
            <div class="infoRow"><span class="infoLabel">走行距離</span><span class="infoVal">${km>0?km+'km':'-'}</span></div>
            <div class="infoRow"><span class="infoLabel">燃料費</span><span class="infoVal">${fuelCost>0?'¥'+fuelCost.toLocaleString():'-'}</span></div>
            <div class="infoRow"><span class="infoLabel">配布完了</span><span class="infoVal">${done}件</span></div>
          </div>
          ${reports.length>0 ? `
          <div style="margin-top:12px;">
            <div class="genreTabs" id="genreTabReport_${d.id}">
              <div class="genreTab active" onclick="filterReport('${d.id}','all',this)">すべて</div>
              <div class="genreTab" onclick="filterReport('${d.id}','hotel',this)">🏨 ホテル</div>
              <div class="genreTab" onclick="filterReport('${d.id}','rental',this)">🚗 レンタカー</div>
              <div class="genreTab" onclick="filterReport('${d.id}','michi',this)">🌳 道の駅</div>
            </div>
            <div id="reportFacs_${d.id}" class="tableWrap">
              ${buildReportTable(reports, 'all')}
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

function buildReportTable(reports, genre) {
  const filtered = reports.filter(r => {
    const f = state.facilities.find(f=>f.id===r.facId);
    return genre==='all' || f?.genre===genre;
  });
  if (filtered.length===0) return '<p style="color:var(--slate-light);font-size:13px;padding:12px;">なし</p>';
  return `<table><thead><tr><th>施設名</th><th>ジャンル</th><th>エリア</th><th>状況</th><th>メモ</th></tr></thead>
  <tbody>${filtered.map(r=>{
    const f = state.facilities.find(f=>f.id===r.facId);
    return `<tr>
      <td style="font-weight:600;">${f?.name||r.facId}</td>
      <td style="font-size:12px;">${{hotel:'🏨',rental:'🚗',michi:'🌳'}[f?.genre]||''}</td>
      <td><span class="badge badge-area${f?.zone||'1'}">${AREA_NAMES[f?.zone]||''}</span></td>
      <td><span class="badge ${r.status==='done'?'badge-done':r.status==='skip'?'badge-skip':'badge-pending'}">${r.status==='done'?'完了':r.status==='skip'?'不要':'未完了'}</span></td>
      <td style="font-size:12px;color:var(--slate-mid);">${r.note||'-'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function filterReport(delivId, genre, btn) {
  btn.closest('.genreTabs').querySelectorAll('.genreTab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const delivery = state.deliveries.find(d=>d.id===delivId);
  document.getElementById(`reportFacs_${delivId}`).innerHTML = buildReportTable(delivery?.reports||[], genre);
}

function printReport(delivId) {
  const d = state.deliveries.find(d=>d.id===delivId);
  if (!d) return;
  const staff = state.staff.find(s=>s.id===d.staffId);
  const km = (parseFloat(d.endKm)||0) - (parseFloat(d.startKm)||0);
  const fuelCost = staff ? Math.round(km/(staff.fuel||15)*FUEL_PRICE) : 0;
  const zone = state.schedules.find(s=>s.staffId===d.staffId&&s.date===d.date)?.zoneId || staff?.zone;
  const reports = d.reports||[];
  const done = reports.filter(r=>r.status==='done');

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
  <title>日報 ${d.date}</title>
  <style>
    body{font-family:'Noto Sans JP',sans-serif;padding:40px;color:#1e293b;max-width:800px;margin:0 auto;}
    h1{font-size:22px;margin-bottom:4px;color:#005f7f;}
    .sub{color:#94a3b8;font-size:13px;margin-bottom:24px;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
    .box{border:1px solid #e2e8f0;border-radius:8px;padding:16px;}
    .bl{font-size:12px;color:#94a3b8;}
    .bv{font-size:20px;font-weight:700;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:#f8fafc;padding:8px 12px;text-align:left;border-bottom:1px solid #e2e8f0;}
    td{padding:8px 12px;border-bottom:1px solid #e2e8f0;}
    .done{color:#2d7a4f;font-weight:600;}
    .pending{color:#ff6b4a;}
    @media print{body{padding:20px}}
  </style>
  </head><body>
  <h1>📋 配布業務 日報</h1>
  <div class="sub">${d.date} / ${staff?.name||'不明'} / ${AREA_NAMES[zone]||''}</div>
  <div class="grid">
    <div class="box"><div class="bl">出発時刻</div><div class="bv">${d.startTime||'-'}</div></div>
    <div class="box"><div class="bl">終了時刻</div><div class="bv">${d.endTime||'-'}</div></div>
    <div class="box"><div class="bl">走行距離</div><div class="bv">${km>0?km+'km':'-'}</div></div>
    <div class="box"><div class="bl">燃料費概算</div><div class="bv">${fuelCost>0?'¥'+fuelCost.toLocaleString():'-'}</div></div>
    <div class="box"><div class="bl">車両ナンバー</div><div class="bv" style="font-size:14px;">${staff?.car||'-'}</div></div>
    <div class="box"><div class="bl">配布完了</div><div class="bv">${done.length}件</div></div>
  </div>
  <h2 style="font-size:16px;margin-bottom:12px;">巡回施設</h2>
  <table>
    <thead><tr><th>施設名</th><th>ジャンル</th><th>エリア</th><th>状況</th><th>メモ</th></tr></thead>
    <tbody>${reports.map(r=>{
      const f = state.facilities.find(f=>f.id===r.facId);
      return `<tr>
        <td><strong>${f?.name||r.facId}</strong></td>
        <td>${{hotel:'ホテル',rental:'レンタカー',michi:'道の駅・観光'}[f?.genre]||''}</td>
        <td>${AREA_NAMES[f?.zone]||''}</td>
        <td class="${r.status==='done'?'done':'pending'}">${r.status==='done'?'✓ 完了':r.status==='skip'?'→ 補充不要':'✗ 未完了'}</td>
        <td>${r.note||''}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>
  <div style="margin-top:32px;color:#94a3b8;font-size:11px;border-top:1px solid #e2e8f0;padding-top:12px;">
    出力日時: ${new Date().toLocaleString('ja-JP')} ／ パンフレット配布管理システム
  </div>
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  win.document.close();
}

// ============================================================
// AVAILABILITY (Staff)
// ============================================================
function renderAvailability() {
  const uid = state.currentUser.id;
  if (!state.availability[uid]) state.availability[uid] = {};
  const av = state.availability[uid];

  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthStr = `${year}年${month+1}月`;

  const days = ['日','月','火','水','木','金','土'];

  let calHtml = `<div class="calHeader">${days.map(d=>`<div class="calDayLabel">${d}</div>`).join('')}</div><div class="calGrid">`;
  for (let i=0; i<firstDay; i++) calHtml += '<div></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === state.today;
    const val = av[dateStr];
    const cls = isToday ? 'today' : val==='available' ? 'available' : val==='unavailable' ? 'unavailable' : '';
    calHtml += `<div class="calDay ${cls}" onclick="toggleAvail('${dateStr}')">${d}</div>`;
  }
  calHtml += '</div>';

  // My schedules for this period
  const myScheds = state.schedules.filter(s=>s.staffId===uid);

  document.getElementById('availContent').innerHTML = `
    <div class="twoCol">
      <div class="card">
        <div class="cardTitle">📆 ${monthStr} 出勤可能日</div>
        <div class="alert alert-info" style="margin-bottom:12px;">
          タップして 🟢 出勤可 ／ 🔴 不可 を切り替えてください
        </div>
        <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--forest);"></div>出勤可</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--coral);"></div>不可</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--ocean);"></div>今日</div>
        </div>
        ${calHtml}
      </div>
      <div class="card">
        <div class="cardTitle">📋 配達指示</div>
        ${myScheds.length===0 ? '<p style="color:var(--slate-light);font-size:13px;">配達指示なし</p>' :
        `<div class="facilityList">${myScheds.sort((a,b)=>a.date>b.date?1:-1).map(s => `
          <div class="facilityCard ${s.response==='ok'?'done':s.response==='ng'?'pending':''}">
            <div class="fcTop">
              <div>
                <div class="fcName">📅 ${s.date}</div>
                <div class="fcMeta"><span class="badge badge-area${s.zoneId}">${AREA_NAMES[s.zoneId]||''}</span></div>
              </div>
              <span class="badge ${s.response==='ok'?'badge-done':s.response==='ng'?'badge-pending':'badge-skip'}">${s.response==='ok'?'対応可':s.response==='ng'?'対応不可':'未回答'}</span>
            </div>
            ${!s.response ? `<div class="fcActions">
              <button class="btn btn-forest btn-sm" onclick="respondSchedule('${s.id}','ok');renderAvailability()">✅ 対応可</button>
              <button class="btn btn-coral btn-sm" onclick="respondSchedule('${s.id}','ng');renderAvailability()">❌ 対応不可</button>
            </div>` : ''}
          </div>`).join('')}</div>`}
      </div>
    </div>`;
}

function toggleAvail(dateStr) {
  const uid = state.currentUser.id;
  if (!state.availability[uid]) state.availability[uid] = {};
  const cur = state.availability[uid][dateStr];
  state.availability[uid][dateStr] = cur==='available' ? 'unavailable' : cur==='unavailable' ? '' : 'available';
  saveState(); renderAvailability();
}

// ============================================================
// UTILS
// ============================================================
function addNotif(text) {
  state.notifications.unshift({id:'n'+Date.now(), text, time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}), unread:true});
  if (state.notifications.length > 20) state.notifications.pop();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function addPhoto(input, containerId) {
  const container = document.getElementById(containerId);
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement('div');
      div.className = 'photoThumb';
      div.innerHTML = `<img src="${e.target.result}" alt="photo"><button class="del" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ============================================================
// INIT
// ============================================================
loadState();
setupPinInputs();
document.getElementById('startTime').value = new Date().toTimeString().slice(0,5);
document.getElementById('endTime').value = new Date().toTimeString().slice(0,5);
setLoginType('admin');
</script>
