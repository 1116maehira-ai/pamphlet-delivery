<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パンフレット配布記録 | 沖縄</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #054c9c;
  --navy-dark: #033a78;
  --navy-light: #e8f0fb;
  --yellow: #fff9c4;
  --yellow-dark: #f0de30;
  --yellow-text: #7a6000;
  --green: #4aa876;
  --green-light: #eaf6f0;
  --green-text: #2d6e50;
  --green-border: #b8deca;
  --coral: #e87d4a;
  --coral-light: #fff0ec;
  --coral-border: #f5c4a0;
  --coral-text: #c0552a;
  --slate: #1a2340;
  --slate-mid: #4a5568;
  --slate-light: #94a3b8;
  --bg: #f7faff;
  --card: #ffffff;
  --border: #dce8f8;
  --shadow: 0 2px 12px rgba(5,76,156,0.08);
  --radius: 16px;
  /* Legacy */
  --ocean: #054c9c;
  --ocean-deep: #033a78;
  --ocean-light: #e8f0fb;
  --forest: #4aa876;
  --forest-light: #eaf6f0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Hiragino Sans','Noto Sans JP',sans-serif; background:var(--bg); color:var(--slate); min-height:100vh; font-size:13px; }

/* HEADER */
.header { background:var(--navy); color:white; padding:16px 24px; display:flex; align-items:center; gap:16px; }
.header h1 { font-size:20px; font-weight:700; }
.header p { font-size:12px; opacity:0.8; margin-top:4px; }
.header-meta { display:flex; gap:16px; margin-top:12px; font-size:12px; opacity:0.9; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; padding:16px 24px; background:white; border-bottom:1px solid var(--border); }
.stat { text-align:center; }
.stat-val { font-size:28px; font-weight:700; font-family:monospace; }
.stat-lbl { font-size:11px; color:var(--slate-light); margin-top:2px; }
.ocean { color:var(--ocean-deep); }
.forest { color:var(--forest); }
.coral { color:var(--coral); }

/* TABS */
.tabs { display:flex; gap:0; background:white; border-bottom:2px solid var(--border); padding:0 24px; overflow-x:auto; }
.tab { padding:12px 20px; font-size:13px; font-weight:600; color:var(--slate-mid); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap; transition:all 0.2s; }
.tab.active { color:var(--ocean-deep); border-bottom-color:var(--ocean); }

/* FILTERS */
.filters { padding:12px 24px; background:white; border-bottom:1px solid var(--border); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.filters input, .filters select { padding:7px 12px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; outline:none; }
.filters input:focus, .filters select:focus { border-color:var(--navy); }
.badge-count { background:var(--ocean-light); color:var(--ocean-deep); padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }

/* TABLE */
.table-wrap { overflow-x:auto; padding:16px 24px; }
table { width:100%; border-collapse:collapse; font-size:12px; background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
th { background:var(--ocean-deep); color:white; padding:10px 12px; text-align:left; font-weight:600; white-space:nowrap; font-size:11px; }
th.center { text-align:center; }
td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#f8fafc; }
tr.done-row td { background:var(--green-light); }
tr.section-header td { background:#f1f5f9; font-weight:700; color:var(--slate-mid); font-size:11px; padding:6px 12px; }

/* BADGES */
.badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:700; }
.badge-done { background:var(--forest-light); color:var(--forest); }
.badge-pending { background:var(--coral-light); color:var(--coral); }
.badge-lang { background:#e0f2fe; color:#0369a1; margin:1px; }

/* LOADING */
#loading { position:fixed; inset:0; background:linear-gradient(135deg,var(--ocean-deep),var(--ocean)); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:999; }
#loading .spin { width:36px; height:36px; border:3px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { color:white; font-size:14px; }

/* UPDATED */
.updated { font-size:11px; color:var(--slate-light); padding:8px 24px; text-align:right; }

@media (max-width:640px) {
  .stats { grid-template-columns:repeat(2,1fr); padding:12px; }
  .table-wrap { padding:8px; }
  .filters { padding:8px 12px; }
}
</style>
</head>

<script>
const SUPABASE_URL = 'https://aruxvisynbmhoolngibg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFydXh2aXN5bmJtaG9vbG5naWJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODM2MzIsImV4cCI6MjA4OTU1OTYzMn0.XlyMTlBZqQH5XV42Q9GtejsXY2jhJv_4oYldBWrMXmg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allFacilities = [];
let allReports = [];
let allDeliveries = [];
let currentTab = 'hotel';

async function loadData() {
  const [facRes, repRes, delivRes] = await Promise.all([
    sb.from('facilities').select('*').order('zone').order('id'),
    sb.from('reports').select('*'),
    sb.from('deliveries').select('*'),
  ]);
  allFacilities = facRes.data || [];
  allReports = repRes.data || [];
  allDeliveries = delivRes.data || [];
  updateStats();
  renderTable();
  document.getElementById('updatedTime').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'});
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function updateStats() {
  const total = allFacilities.length;
  const done = allFacilities.filter(f => f.status === 'done').length;
  const pending = allFacilities.filter(f => f.status === 'pending').length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statPct').textContent = pct + '%';
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['hotel','rental','michi','all'][i] === tab);
  });
  renderTable();
}

function getLatestReport(facId) {
  // その施設への最新のreportを取得
  const facReports = allReports.filter(r => r.fac_id === facId);
  if (!facReports.length) return null;
  return facReports.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
}

function getDeliveryDate(deliveryId) {
  const d = allDeliveries.find(d => d.id === deliveryId);
  return d ? d.date : null;
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;

  let facs = allFacilities;
  if (currentTab !== 'all') facs = facs.filter(f => f.genre === currentTab);
  if (q) facs = facs.filter(f => (f.name||'').toLowerCase().includes(q) || (f.area1||'').toLowerCase().includes(q) || (f.area2||'').toLowerCase().includes(q));
  if (statusFilter !== 'all') facs = facs.filter(f => f.status === statusFilter);

  document.getElementById('countBadge').textContent = facs.length + '件';

  // ヘッダー
  const head = document.getElementById('tableHead');
  head.innerHTML = `<tr>
    <th>No</th>
    <th>地域</th>
    <th>施設名</th>
    <th>住所</th>
    <th class="center">状況</th>
    <th class="center">配布日</th>
    <th class="center">パンフ種類・枚数</th>
    <th>先方担当者</th>
    <th>備考</th>
  </tr>`;

  // ボディ
  const body = document.getElementById('tableBody');
  if (facs.length === 0) {
    body.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:#94a3b8;">該当する施設がありません</td></tr>';
    return;
  }

  // ゾーン別にグループ化
  const ZONE_NAMES = {'1':'エリア1 那覇市','2':'エリア2 南部','3':'エリア3 中部','4':'エリア4 北部・恩納','5':'エリア5 名護・本部'};
  let currentZone = null;
  let rowNum = 0;
  let html = '';

  facs.forEach(f => {
    if (currentTab === 'all' && f.zone !== currentZone) {
      currentZone = f.zone;
      html += `<tr class="section-header"><td colspan="9">📍 ${ZONE_NAMES[f.zone] || 'エリア' + f.zone}</td></tr>`;
    }
    rowNum++;
    const report = getLatestReport(f.id);
    const isDone = f.status === 'done';
    const delivDate = report ? getDeliveryDate(report.delivery_id) : null;

    // パンフ詳細
    let pamphHtml = '-';
    if (report) {
      try {
        const detail = JSON.parse(report.pamph_detail || '{}');
        const entries = Object.entries(detail);
        if (entries.length > 0) {
          pamphHtml = entries.map(([k,v]) => `<span class="badge badge-lang">【${k}】${v}枚</span>`).join('');
        } else if (report.pamph_count) {
          pamphHtml = `${report.pamph_count}枚`;
        }
      } catch(e) {
        pamphHtml = report.pamph_count ? `${report.pamph_count}枚` : '-';
      }
    }

    html += `<tr class="${isDone ? 'done-row' : ''}">
      <td style="color:#94a3b8;font-family:monospace;">${rowNum}</td>
      <td style="white-space:nowrap;">${f.area1 || ''}${f.area2 ? '<br><span style="color:#94a3b8;font-size:10px;">'+f.area2+'</span>' : ''}</td>
      <td style="font-weight:600;">${f.name}</td>
      <td style="color:#475569;font-size:11px;">${f.address || '-'}</td>
      <td style="text-align:center;"><span class="badge ${isDone ? 'badge-done' : 'badge-pending'}">${isDone ? '<span style="display:inline-flex;align-items:center;gap:3px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>完了</span>' : '未完了'}</span></td>
      <td style="text-align:center;white-space:nowrap;font-size:11px;">${delivDate || (f.last_done ? f.last_done : '-')}</td>
      <td style="text-align:center;">${pamphHtml}</td>
      <td style="font-size:11px;">${report?.facility_contact || '-'}</td>
      <td style="font-size:11px;color:#475569;">${report?.note || '-'}</td>
    </tr>`;
  });

  body.innerHTML = html;
}

// リアルタイム更新
function setupRealtime() {
  sb.channel('client-view')
    .on('postgres_changes', {event:'*', schema:'public', table:'facilities'}, async () => {
      const {data} = await sb.from('facilities').select('*').order('zone').order('id');
      if (data) { allFacilities = data; updateStats(); renderTable(); }
      document.getElementById('updatedTime').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'reports'}, async () => {
      const {data} = await sb.from('reports').select('*');
      if (data) { allReports = data; renderTable(); }
      document.getElementById('updatedTime').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
    })
    .subscribe();
}

loadData().then(() => setupRealtime());
</script>
</body>
