<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パンフレット配布管理システム | 沖縄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ocean: #0099cc;
  --ocean-deep: #005f7f;
  --ocean-light: #e6f7ff;
  --coral: #ff6b4a;
  --coral-light: #fff0ec;
  --sand: #f5f0e8;
  --sand-dark: #e8e0cc;
  --forest: #2d7a4f;
  --forest-light: #e8f5ee;
  --amber: #f59e0b;
  --amber-light: #fffbeb;
  --slate: #1e293b;
  --slate-mid: #475569;
  --slate-light: #94a3b8;
  --white: #ffffff;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #e2e8f0;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--slate); min-height:100vh; font-size:14px; }

/* LOADING */
#loadingScreen { position:fixed; inset:0; background:linear-gradient(135deg,#005f7f,#0099cc); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:16px; }
#loadingScreen .spin { width:40px; height:40px; border:3px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loadingScreen p { color:white; font-size:14px; }

/* LOGIN */
#loginScreen { min-height:100vh; background:linear-gradient(135deg,#005f7f 0%,#0099cc 40%,#00b8d4 70%,#26c6da 100%); display:flex; align-items:center; justify-content:center; padding:20px; position:relative; overflow:hidden; display:none; }
#loginScreen::before { content:''; position:absolute; bottom:-80px; left:-40px; width:500px; height:500px; border-radius:50%; background:rgba(255,255,255,0.05); }
.loginCard { background:white; border-radius:24px; padding:48px 40px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.2); position:relative; z-index:1; }
.loginLogo { text-align:center; margin-bottom:32px; }
.loginLogo .wave { font-size:48px; }
.loginLogo h1 { font-size:20px; font-weight:700; color:var(--slate); margin-top:12px; }
.loginLogo p { font-size:12px; color:var(--slate-light); margin-top:4px; }
.loginOptions { display:flex; gap:12px; margin-bottom:28px; }
.loginOption { flex:1; padding:12px; border:2px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; text-align:center; font-size:13px; color:var(--slate-mid); transition:all 0.2s; background:white; }
.loginOption.active { border-color:var(--ocean); background:var(--ocean-light); color:var(--ocean-deep); font-weight:600; }
.pinInput { display:flex; gap:10px; justify-content:center; margin-bottom:24px; }
.pinDigit { width:52px; height:60px; border:2px solid var(--border); border-radius:var(--radius-sm); text-align:center; font-size:24px; font-weight:700; font-family:'DM Mono',monospace; color:var(--ocean-deep); outline:none; transition:all 0.2s; background:var(--bg); }
.pinDigit:focus { border-color:var(--ocean); background:white; box-shadow:0 0 0 3px rgba(0,153,204,0.15); }
.staffSelect { width:100%; padding:12px 16px; border:2px solid var(--border); border-radius:var(--radius-sm); font-size:14px; color:var(--slate); font-family:'Noto Sans JP',sans-serif; background:var(--bg); outline:none; margin-bottom:20px; transition:border-color 0.2s; }
.btnLogin { width:100%; padding:16px; background:linear-gradient(135deg,var(--ocean-deep),var(--ocean)); color:white; border:none; border-radius:var(--radius-sm); font-size:16px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; }
.btnLogin:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,99,153,0.3); }
.loginErr { color:var(--coral); font-size:13px; text-align:center; margin-top:12px; display:none; }

/* HEADER */
#app { display:none; }
.header { background:white; border-bottom:1px solid var(--border); padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
.headerLogo { font-size:16px; font-weight:700; color:var(--ocean-deep); }
.headerUser { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--bg); border-radius:20px; font-size:13px; font-weight:500; }
.userBadge { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:white; }
.badge-admin { background:var(--coral); }
.badge-staff { background:var(--ocean); }
.btnLogout { padding:6px 14px; background:none; border:1px solid var(--border); border-radius:20px; font-size:12px; cursor:pointer; color:var(--slate-mid); font-family:'Noto Sans JP',sans-serif; }

/* NAV */
.nav { background:white; border-bottom:1px solid var(--border); padding:0 20px; display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; }
.nav::-webkit-scrollbar { display:none; }
.navItem { padding:12px 16px; font-size:13px; font-weight:500; color:var(--slate-mid); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.2s; }
.navItem.active { color:var(--ocean-deep); border-bottom-color:var(--ocean); font-weight:600; }

/* MAIN */
.main { padding:20px; max-width:1400px; margin:0 auto; }
.pageTitle { font-size:22px; font-weight:700; margin-bottom:20px; color:var(--slate); }

/* CARDS */
.card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; border:1px solid var(--border); }
.cardTitle { font-size:15px; font-weight:700; color:var(--slate); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* STATS */
.statsGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:20px; }
.statCard { background:white; border-radius:var(--radius); padding:20px; border:1px solid var(--border); box-shadow:var(--shadow); }
.statLabel { font-size:12px; color:var(--slate-light); font-weight:500; margin-bottom:8px; }
.statValue { font-size:32px; font-weight:700; font-family:'DM Mono',monospace; color:var(--slate); }
.statSub { font-size:12px; color:var(--slate-light); margin-top:4px; }
.statCard.ocean .statValue { color:var(--ocean-deep); }
.statCard.coral .statValue { color:var(--coral); }
.statCard.forest .statValue { color:var(--forest); }
.statCard.amber .statValue { color:var(--amber); }

/* TABLE */
.tableWrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--bg); padding:10px 14px; text-align:left; font-weight:600; color:var(--slate-mid); border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--bg); }

/* BADGES */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
.badge-done { background:var(--forest-light); color:var(--forest); }
.badge-pending { background:var(--coral-light); color:var(--coral); }
.badge-skip { background:var(--sand); color:var(--slate-mid); }
.badge-area1 { background:#e0f2fe; color:#0369a1; }
.badge-area2 { background:#fef3c7; color:#92400e; }
.badge-area3 { background:#f0fdf4; color:#166534; }
.badge-area4 { background:#fdf4ff; color:#7e22ce; }
.badge-area5 { background:#fff1f2; color:#be123c; }

/* BUTTONS */
.btn { padding:8px 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:'Noto Sans JP',sans-serif; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--ocean); color:white; }
.btn-primary:hover { background:var(--ocean-deep); }
.btn-coral { background:var(--coral); color:white; }
.btn-forest { background:var(--forest); color:white; }
.btn-outline { background:white; color:var(--slate); border:1px solid var(--border); }
.btn-outline:hover { background:var(--bg); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-lg { padding:12px 24px; font-size:15px; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }

/* FORMS */
.formGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:16px; }
.formGroup { display:flex; flex-direction:column; gap:6px; }
.formLabel { font-size:12px; font-weight:600; color:var(--slate-mid); }
.formInput,.formSelect { padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--slate); background:white; outline:none; transition:border-color 0.2s; }
.formInput:focus,.formSelect:focus { border-color:var(--ocean); }
textarea.formInput { resize:vertical; }

/* AREA FILTER */
.areaFilters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.areaBtn { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
.areaBtn-all { background:var(--slate); color:white; }
.areaBtn-1 { background:#e0f2fe; color:#0369a1; border-color:#7dd3fc; }
.areaBtn-2 { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
.areaBtn-3 { background:#f0fdf4; color:#166534; border-color:#86efac; }
.areaBtn-4 { background:#fdf4ff; color:#7e22ce; border-color:#d8b4fe; }
.areaBtn-5 { background:#fff1f2; color:#be123c; border-color:#fda4af; }
.areaBtn.active { box-shadow:0 2px 8px rgba(0,0,0,0.15); transform:translateY(-1px); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:var(--radius); width:100%; max-width:600px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
.modal-header { padding:20px 24px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; background:white; z-index:1; }
.modal-title { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--slate-light); padding:4px; }
.modal-body { padding:20px 24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* PHOTO */
input[type=file] { display:none; }
.fileLabel { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; font-size:12px; color:var(--slate-mid); background:white; transition:all 0.2s; }
.fileLabel:hover { border-color:var(--ocean); color:var(--ocean); }
.photoGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.photoThumb { aspect-ratio:1; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border); overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--slate-light); }
.photoThumb img { width:100%; height:100%; object-fit:cover; }
.photoThumb .del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* PROGRESS */
.progressBar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:8px 0; }
.progressFill { height:100%; border-radius:4px; transition:width 0.3s ease; }
.progress-ocean { background:linear-gradient(90deg,var(--ocean-deep),var(--ocean)); }
.progress-forest { background:linear-gradient(90deg,#166534,var(--forest)); }
.progress-coral { background:linear-gradient(90deg,#be123c,var(--coral)); }

/* FACILITY CARD */
.facilityList { display:flex; flex-direction:column; gap:10px; }
.facilityCard { background:white; border-radius:var(--radius); padding:16px; border:1px solid var(--border); box-shadow:var(--shadow); transition:all 0.2s; }
.facilityCard.done { border-left:4px solid var(--forest); }
.facilityCard.pending { border-left:4px solid var(--coral); }
.facilityCard.skip { border-left:4px solid var(--sand-dark); opacity:0.7; }
.fcTop { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.fcName { font-weight:700; font-size:14px; color:var(--slate); }
.fcMeta { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.fcTag { font-size:11px; color:var(--slate-light); display:flex; align-items:center; gap:4px; }
.fcActions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }

/* STAFF CARD */
.staffGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.staffCard { background:white; border-radius:var(--radius); padding:20px; border:1px solid var(--border); box-shadow:var(--shadow); }
.staffAvatar { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:12px; }
.staffName { font-weight:700; font-size:15px; }
.staffMeta { font-size:12px; color:var(--slate-light); margin-top:4px; }
.statusDot { width:8px; height:8px; border-radius:50%; }
.statusDot.online { background:var(--forest); }
.statusDot.offline { background:var(--slate-light); }

/* CALENDAR */
.calGrid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.calDay { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; transition:all 0.2s; border:1px solid transparent; }
.calDay.today { background:var(--ocean); color:white; }
.calDay.available { background:var(--forest-light); color:var(--forest); border-color:var(--forest); font-weight:700; }
.calDay.unavailable { background:var(--coral-light); color:var(--coral); border-color:var(--coral); }
.calDay:hover:not(.today) { background:var(--bg); }
.calHeader { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:8px; }
.calDayLabel { text-align:center; font-size:11px; font-weight:600; color:var(--slate-light); }

/* ROUTE */
.routeList { display:flex; flex-direction:column; }
.routeItem { display:flex; gap:12px; align-items:flex-start; }
.routeLine { display:flex; flex-direction:column; align-items:center; }
.routeDot { width:12px; height:12px; border-radius:50%; background:var(--ocean); border:2px solid white; box-shadow:0 0 0 2px var(--ocean); flex-shrink:0; margin-top:3px; }
.routeConnector { width:2px; flex:1; background:var(--border); min-height:20px; }
.routeInfo { padding-bottom:16px; flex:1; }
.routeName { font-weight:600; font-size:13px; }
.routeAddr { font-size:11px; color:var(--slate-light); margin-top:2px; }

/* NOTIF */
.notifItem { padding:12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg); font-size:13px; margin-bottom:8px; }
.notifItem.unread { background:var(--ocean-light); border-color:var(--ocean); }

/* MISC */
.twoCol { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.separator { height:1px; background:var(--border); margin:16px 0; }
.infoRow { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
.infoRow:last-child { border-bottom:none; }
.infoLabel { color:var(--slate-mid); font-weight:500; }
.infoVal { font-weight:600; }
.alert { padding:12px 16px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; }
.alert-info { background:var(--ocean-light); color:var(--ocean-deep); border:1px solid #7dd3fc; }
.alert-warn { background:var(--amber-light); color:#92400e; border:1px solid #fcd34d; }
.alert-success { background:var(--forest-light); color:var(--forest); border:1px solid #86efac; }
.genreTabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.genreTab { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:white; color:var(--slate-mid); transition:all 0.2s; }
.genreTab.active { background:var(--ocean); color:white; border-color:var(--ocean); }
.searchBar { position:relative; margin-bottom:16px; }
.searchBar input { width:100%; padding:10px 14px 10px 40px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:'Noto Sans JP',sans-serif; outline:none; background:white; transition:border-color 0.2s; }
.searchBar input:focus { border-color:var(--ocean); }
.searchBar .icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--slate-light); }
.page { display:none; }
.page.active { display:block; }
.meterPhoto { border-radius:var(--radius-sm); border:1px solid var(--border); padding:12px; background:var(--bg); margin-bottom:16px; }
.meterPhoto .label { font-size:11px; font-weight:600; color:var(--slate-mid); margin-bottom:8px; }
.completeCheckAnim { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; background:var(--forest); color:white; font-size:14px; animation:popIn 0.3s ease; }
@keyframes popIn { 0%{transform:scale(0)} 80%{transform:scale(1.2)} 100%{transform:scale(1)} }
@media (max-width:900px) { .twoCol { grid-template-columns:1fr; } }
@media (max-width:640px) { .main{padding:12px;} .statsGrid{grid-template-columns:repeat(2,1fr);gap:10px;} .statValue{font-size:24px;} .formGrid{grid-template-columns:1fr;} .loginCard{padding:32px 24px;} .header{padding:0 12px;} }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spin"></div>
  <p>接続中...</p>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="loginCard">
    <div class="loginLogo">
      <div class="wave">🌊</div>
      <h1>パンフレット配布管理</h1>
      <p>沖縄本島 施設巡回システム</p>
    </div>
    <div class="loginOptions">
      <div class="loginOption active" id="optAdmin" onclick="setLoginType('admin')">🔑 管理者</div>
      <div class="loginOption" id="optStaff" onclick="setLoginType('staff')">👤 担当者</div>
    </div>
    <div id="staffSelectWrap" style="display:none;">
      <select class="staffSelect" id="staffPicker">
        <option value="">担当者を選択してください</option>
      </select>
    </div>
    <div class="pinInput">
      <input class="pinDigit" type="password" maxlength="1" id="p1" inputmode="numeric">
      <input class="pinDigit" type="password" maxlength="1" id="p2" inputmode="numeric">
      <input class="pinDigit" type="password" maxlength="1" id="p3" inputmode="numeric">
      <input class="pinDigit" type="password" maxlength="1" id="p4" inputmode="numeric">
    </div>
    <button class="btnLogin" onclick="doLogin()">ログイン</button>
    <p class="loginErr" id="loginErr">PINコードが違います</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <span class="headerLogo">🌊 配布管理</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="headerUser">
        <div class="userBadge" id="userBadge">A</div>
        <span id="userNameDisp">管理者</span>
      </div>
      <button class="btnLogout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <nav class="nav" id="mainNav"></nav>
  <div class="main">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="pageTitle">📊 ダッシュボード</div>
      <div class="statsGrid" id="dashStats"></div>
      <div class="twoCol">
        <div class="card"><div class="cardTitle">📋 エリア別進捗</div><div id="areaProgress"></div></div>
        <div class="card"><div class="cardTitle">🔔 最新通知</div><div id="notifList"></div></div>
      </div>
      <div class="card" style="margin-top:20px;"><div class="cardTitle">📅 本日のスケジュール</div><div id="todaySchedule"></div></div>
      <div id="adminResetPanel"></div>
    </div>
    <!-- FACILITIES -->
    <div class="page" id="page-facilities">
      <div class="pageTitle">🏨 施設一覧</div>
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <div class="searchBar" style="flex:1;min-width:200px;margin-bottom:0;"><span class="icon">🔍</span><input type="text" id="facilSearch" placeholder="施設名・住所で検索..." oninput="renderFacilities()"></div>
          <div class="genreTabs" style="margin-bottom:0;" id="genreTabs"></div>
          <button class="btn btn-primary btn-sm" onclick="openAddFacility()">＋ 施設追加</button>
        </div>
        <div class="areaFilters" style="margin-top:12px;margin-bottom:0;" id="areaFilterBtns"></div>
      </div>
      <div id="facilitiesContainer"></div>
    </div>
    <!-- DELIVERY -->
    <div class="page" id="page-delivery"><div class="pageTitle">🚗 本日の配達</div><div id="deliveryContent"></div></div>

async function initDB() {
  // Check if tables exist by trying to fetch staff
  const { data, error } = await sb.from('staff').select('id').limit(1);
  if (error && error.code === '42P01') {
    // Tables don't exist - show setup message
    showLoading('初回セットアップ中...');
    await setupTables();
  }
}

async function setupTables() {
  // Create tables via SQL
  const sql = `
    create table if not exists staff (
      id text primary key,
      name text not null,
      pin text not null,
      car text,
      fuel numeric default 15,
      zone text,
      emoji text default '👤',
      online boolean default false,
      created_at timestamptz default now()
    );
    create table if not exists facilities (
      id text primary key,
      name text not null,
      genre text default 'hotel',
      area1 text,
      area2 text,
      address text,
      tel text,
      rack text default 'ラック',
      zone text default '1',
      status text default 'pending',
      last_done date,
      created_at timestamptz default now()
    );
    create table if not exists schedules (
      id text primary key,
      staff_id text,
      date date not null,
      zone_id text,
      note text,
      response text default '',
      created_at timestamptz default now()
    );
    create table if not exists deliveries (
      id text primary key,
      staff_id text,
      date date not null,
      started boolean default false,
      ended boolean default false,
      start_km numeric,
      end_km numeric,
      start_time text,
      end_time text,
      created_at timestamptz default now()
    );
    create table if not exists reports (
      id text primary key,
      delivery_id text,
      fac_id text,
      status text,
      note text,
      created_at timestamptz default now()
    );
    create table if not exists notifications (
      id text primary key,
      text text,
      time text,
      unread boolean default true,
      created_at timestamptz default now()
    );
    create table if not exists availability (
      id text primary key,
      staff_id text,
      date date,
      value text,
      created_at timestamptz default now(),
      unique(staff_id, date)
    );
    alter table staff disable row level security;
    alter table facilities disable row level security;
    alter table schedules disable row level security;
    alter table deliveries disable row level security;
    alter table reports disable row level security;
    alter table notifications disable row level security;
    alter table availability disable row level security;
  `;
  // We'll use REST API to insert data directly, tables need to be created via Supabase SQL editor
  // For now, seed with initial data
  await seedInitialData();
}

async function seedInitialData() {
  // Insert initial facilities
  const facs = INITIAL_FACILITIES.map(f => ({
    id: f.id, name: f.name, genre: f.genre, area1: f.area1, area2: f.area2,
    address: f.address, tel: f.tel, rack: f.rack, zone: f.zone,
    status: 'pending', last_done: null
  }));
  const { error } = await sb.from('facilities').upsert(facs, {onConflict:'id'});
  if (error) console.error('seed facilities error:', error);
}

async function loadAllData() {
  showLoading('データを読み込み中...');
  try {
    const [facRes, staffRes, schedRes, delivRes, repRes, notifRes, availRes] = await Promise.all([
      sb.from('facilities').select('*').order('id'),
      sb.from('staff').select('*').order('name'),
      sb.from('schedules').select('*').order('date', {ascending:false}),
      sb.from('deliveries').select('*').order('date', {ascending:false}),
      sb.from('reports').select('*'),
      sb.from('notifications').select('*').order('created_at', {ascending:false}).limit(50),
      sb.from('availability').select('*'),
    ]);

    if (facRes.data) {
      state.facilities = facRes.data.map(f => ({...f, lastDone: f.last_done}));
      // Auto-reset 14 days
      const now = new Date();
      state.facilities.forEach(f => {
        if (f.status === 'done' && f.lastDone) {
          const diff = (now - new Date(f.lastDone)) / (1000*60*60*24);
          if (diff >= 14) { f.status = 'pending'; f.lastDone = null; updateFacilityStatus(f.id, 'pending', null); }
        }
      });
    }
    if (staffRes.data) state.staff = staffRes.data;
    if (schedRes.data) state.schedules = schedRes.data.map(s => ({...s, staffId:s.staff_id, zoneId:s.zone_id}));
    if (delivRes.data) {
      state.deliveries = delivRes.data.map(d => ({
        ...d,
        staffId: d.staff_id,
        startKm: d.start_km,
        endKm: d.end_km,
        startTime: d.start_time,
        endTime: d.end_time,
        meter_start_photos: d.meter_start_photos || '[]',
        meter_end_photos: d.meter_end_photos || '[]',
        toll_photos: d.toll_photos || '[]',
        reports: []
      }));
    }
    if (repRes.data) {
      repRes.data.forEach(r => {
        const d = state.deliveries.find(d => d.id === r.delivery_id);
        if (d) d.reports.push({
          facId: r.fac_id,
          status: r.status,
          note: r.note,
          id: r.id,
          rack_photos: r.rack_photos || '[]',
          receipt_photos: r.receipt_photos || '[]',
          pamph_types: r.pamph_types || '[]',
          pamph_count: r.pamph_count,
          facility_contact: r.facility_contact,
        });
      });
    }
    if (notifRes.data) {
      // 全件保持しておき、ログイン後にフィルタリング
      state.allNotifications = notifRes.data;
    }
    if (availRes.data) {
      state.availability = {};
      availRes.data.forEach(a => {
        if (!state.availability[a.staff_id]) state.availability[a.staff_id] = {};
        state.availability[a.staff_id][a.date] = a.value;
      });
    }
    // If no facilities, seed them
    if (state.facilities.length === 0) await seedInitialData();

    state.initialized = true;
  } catch(e) {
    console.error('loadAllData error:', e);
  }
  hideLoading();
}

// Realtime subscriptions
function setupRealtime() {
  sb.channel('all-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'facilities'}, () => { reloadFacilities(); renderPage(currentPage); })
    .on('postgres_changes', {event:'*', schema:'public', table:'staff'}, () => { reloadStaff(); renderPage(currentPage); })
    .on('postgres_changes', {event:'*', schema:'public', table:'schedules'}, () => { reloadSchedules(); renderPage(currentPage); })
    .on('postgres_changes', {event:'*', schema:'public', table:'deliveries'}, () => { reloadDeliveries(); renderPage(currentPage); })
    .on('postgres_changes', {event:'*', schema:'public', table:'reports'}, () => { reloadDeliveries(); renderPage(currentPage); })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'notifications'}, async (payload) => {
      const uid = state.currentUser?.id;
      const isAdmin = state.currentUser?.type === 'admin';
      const n = payload.new;
      // 自分に関係ある通知だけ処理
      const relevant = isAdmin ? n.recipient_id === null : n.recipient_id === uid;
      if (relevant) {
        await reloadNotifications();
        if(currentPage==='dashboard') renderDashboard();
      }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'availability'}, () => { reloadAvailability(); renderPage(currentPage); })
    .subscribe();
}

      if (!state.availability[a.staff_id]) state.availability[a.staff_id] = {};

}

let loginType = 'admin';

function setLoginType(t) {
  loginType = t;
  document.getElementById('optAdmin').classList.toggle('active', t==='admin');
  document.getElementById('optStaff').classList.toggle('active', t==='staff');
  document.getElementById('staffSelectWrap').style.display = t==='staff' ? 'block' : 'none';
  if (t === 'staff') {
    const sel = document.getElementById('staffPicker');
    sel.innerHTML = '<option value="">担当者を選択してください</option>';
    state.staff.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.emoji||'👤'} ${s.name}</option>`);
  }
}

function setupPinInputs() {
  ['p1','p2','p3','p4'].forEach((id, i, arr) => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      el.value = el.value.replace(/\D/,'');
      if (el.value && i < 3) document.getElementById(arr[i+1]).focus();
    });
    el.addEventListener('keydown', e => {
      if (e.key==='Backspace' && !el.value && i > 0) document.getElementById(arr[i-1]).focus();
    });
  });
}
function getPin() { return ['p1','p2','p3','p4'].map(id => document.getElementById(id).value).join(''); }
function clearPin() { ['p1','p2','p3','p4'].forEach(id => document.getElementById(id).value=''); document.getElementById('p1').focus(); }

async function doLogin() {
  const pin = getPin();
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  if (loginType === 'admin') {
    if (pin === ADMIN_PIN) {
      state.currentUser = {type:'admin', name:'管理者', id:'admin'};
      enterApp();
    } else { err.style.display='block'; clearPin(); }
  } else {
    const staffId = document.getElementById('staffPicker').value;
    if (!staffId) { err.textContent='担当者を選択してください'; err.style.display='block'; return; }
    const staff = state.staff.find(s => s.id === staffId);
    if (staff && staff.pin === pin) {
      state.currentUser = {type:'staff', name:staff.name, id:staff.id, emoji:staff.emoji};
      // Mark online
      await sb.from('staff').update({online:true}).eq('id', staff.id);
      enterApp();
    } else { err.textContent='PINコードが違います'; err.style.display='block'; clearPin(); }
  }
}

async function doLogout() {
  if (state.currentUser?.type === 'staff') {
    await sb.from('staff').update({online:false}).eq('id', state.currentUser.id);
  }
  state.currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  clearPin();
  setLoginType('admin');
}

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = state.currentUser;
  document.getElementById('userNameDisp').textContent = u.type==='admin' ? '管理者' : u.name;
  const badge = document.getElementById('userBadge');
  if (u.type==='admin') { badge.textContent='A'; badge.className='userBadge badge-admin'; }
  else { badge.textContent=u.emoji||'👤'; badge.className='userBadge badge-staff'; badge.style.fontSize='14px'; }
  // ログイン後に通知をフィルタリング
  const uid2 = state.currentUser?.id;
  const isAdmin2 = state.currentUser?.type === 'admin';
  state.notifications = (state.allNotifications || []).filter(n => {
    if (isAdmin2) return n.recipient_id === null;
    return n.recipient_id === uid2;
  });
  renderNav();
  showPage('dashboard');
  setupRealtime();
}

function renderNav() {
  const pages = state.currentUser.type==='admin' ? ADMIN_PAGES : STAFF_PAGES;
  document.getElementById('mainNav').innerHTML = pages.map(p =>
    `<div class="navItem" id="nav-${p.id}" onclick="showPage('${p.id}')">${p.label}</div>`
  ).join('');
}

function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.navItem').forEach(n => n.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  const nav = document.getElementById(`nav-${id}`);
  if (page) page.classList.add('active');
  if (nav) nav.classList.add('active');
  renderPage(id);
}

function renderPage(id) {
  switch(id) {
    case 'dashboard': renderDashboard(); break;
    case 'facilities': renderFacilities(); break;
    case 'staff': renderStaff(); break;
    case 'schedule': renderSchedule(); break;
    case 'delivery': renderDelivery(); break;
    case 'route': renderRoute(); break;
    case 'reports': renderReports(); break;
    case 'availability': renderAvailability(); break;
  }
}

function renderDashboard() {
  const total = state.facilities.length;
  const done = state.facilities.filter(f=>f.status==='done').length;
  const pending = state.facilities.filter(f=>f.status==='pending').length;
  const activeStaff = state.staff.filter(s=>s.online).length;
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('dashStats').innerHTML = `
    <div class="statCard ocean"><div class="statLabel">登録施設数</div><div class="statValue">${total}</div><div class="statSub">件</div></div>
    <div class="statCard forest"><div class="statLabel">配布完了</div><div class="statValue">${done}</div><div class="statSub">件 (${pct}%)</div></div>
    <div class="statCard coral"><div class="statLabel">未完了</div><div class="statValue">${pending}</div><div class="statSub">件</div></div>
    <div class="statCard amber"><div class="statLabel">本日稼働</div><div class="statValue">${activeStaff}</div><div class="statSub">名</div></div>`;
  document.getElementById('areaProgress').innerHTML = [1,2,3,4,5].map(z => {
    const facs = state.facilities.filter(f => f.zone === String(z));
    const d = facs.filter(f=>f.status==='done').length, t = facs.length;
    const p = t>0 ? Math.round(d/t*100) : 0;
    return `<div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-size:13px;font-weight:600;">${AREA_NAMES[z]}</span><span style="font-size:12px;color:var(--slate-light);">${d}/${t}件</span></div><div class="progressBar"><div class="progressFill progress-${['ocean','forest','ocean','coral','forest'][z-1]}" style="width:${p}%"></div></div></div>`;
  }).join('');
  const notifCount = state.notifications.length;
  const showAll = state.showAllNotif || false;
  const notifToShow = showAll ? state.notifications : state.notifications.slice(0,5);
  document.getElementById('notifList').innerHTML = (notifCount === 0 ? '<p style="color:var(--slate-light);font-size:13px;">通知なし</p>' :
    notifToShow.map(n =>
      `<div class="notifItem ${n.unread?'unread':''}"><div style="display:flex;justify-content:space-between;gap:8px;"><span>${n.text}</span><span style="font-size:11px;color:var(--slate-light);white-space:nowrap;">${n.time}</span></div></div>`
    ).join(''))
    + (notifCount > 5 ? `<div style="text-align:center;margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="state.showAllNotif=!state.showAllNotif;renderDashboard()">${showAll ? '▲ 折りたたむ' : '▼ 全て見る（'+notifCount+'件）'}</button></div>` : '');
  // Admin reset panel
  const resetPanel = document.getElementById('adminResetPanel');
  if (resetPanel) {
    if (state.currentUser.type === 'admin') {
      resetPanel.innerHTML = `
        <div class="card" style="margin-top:20px;border:2px solid var(--coral-light);">
          <div class="cardTitle">⚙️ 管理者操作</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <button class="btn btn-coral" onclick="confirmReset('today')">🔄 本日の活動をリセット</button>
            <button class="btn btn-outline" onclick="confirmReset('facilities')">🏨 配布完了施設をリセット</button>
            <button class="btn btn-outline" onclick="confirmReset('all')">⚠️ 全てリセット</button>
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--slate-light);">※ リセットしたデータは復元できません</div>
        </div>`;
    } else {
      resetPanel.innerHTML = '';
    }
  }

  const todaySched = state.schedules.filter(s => s.date === state.today);
  if (todaySched.length === 0) {
    document.getElementById('todaySchedule').innerHTML = '<p style="color:var(--slate-light);font-size:13px;">本日のスケジュールはありません</p>' +
      (state.currentUser.type==='admin' ? `<button class="btn btn-primary" style="margin-top:12px;" onclick="openScheduleModal()">＋ スケジュールを作成</button>` : '');
  } else {
    document.getElementById('todaySchedule').innerHTML = `<div class="tableWrap"><table><thead><tr><th>担当者</th><th>エリア</th><th>メモ</th><th>回答</th></tr></thead><tbody>${todaySched.map(s => {
      const staff = state.staff.find(st=>st.id===s.staffId);
      return `<tr><td>${staff?.emoji||'👤'} ${staff?.name||'不明'}</td><td><span class="badge badge-area${s.zoneId}">${AREA_NAMES[s.zoneId]||''}</span></td><td>${s.note||'-'}</td><td><span class="badge ${s.response==='ok'?'badge-done':s.response==='ng'?'badge-pending':'badge-skip'}">${s.response==='ok'?'対応可':s.response==='ng'?'対応不可':'未回答'}</span></td></tr>`;
    }).join('')}</tbody></table></div>`;
  }
}

function renderFacilities() {

  document.getElementById('genreTabs').innerHTML = genres.map(g =>
    `<div class="genreTab ${state.filterGenre===g.id?'active':''}" onclick="setGenreFilter('${g.id}')">${g.label}</div>`).join('');
  const areas = [{id:'all',label:'すべてのエリア',cls:'areaBtn-all'},...[1,2,3,4,5].map(i=>({id:String(i),label:AREA_NAMES[i],cls:`areaBtn-${i}`}))];
  document.getElementById('areaFilterBtns').innerHTML = areas.map(a =>
    `<div class="areaBtn ${a.cls} ${state.filterArea===a.id?'active':''}" onclick="setAreaFilter('${a.id}')">${a.label}</div>`).join('');

  if (state.filterArea !== 'all') facs = facs.filter(f=>f.zone===state.filterArea);
  if (q) facs = facs.filter(f=>(f.name||'').toLowerCase().includes(q)||(f.address||'').toLowerCase().includes(q));
  const doneCount = facs.filter(f=>f.status==='done').length;
  document.getElementById('facilitiesContainer').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">

      <span class="badge badge-pending">未完了 ${facs.filter(f=>f.status==='pending').length}件</span>

    <tbody>${facs.map((f,i) => `<tr>
      <td style="color:var(--slate-light);font-family:'DM Mono',monospace;">${i+1}</td>
      <td style="font-weight:600;">${f.name}</td>
      <td><span class="badge badge-area${f.zone}">${AREA_NAMES[f.zone]||f.zone}</span></td>
      <td style="font-size:12px;">${{hotel:'🏨 ホテル',rental:'🚗 レンタカー',michi:'🌳 道の駅',other:'その他'}[f.genre]||f.genre}</td>
      <td style="font-size:12px;color:var(--slate-mid);">${f.address||'-'}</td>
      <td>${f.status==='done'?'<span class="badge badge-done">完了</span>':f.status==='skip'?'<span class="badge badge-skip">不要</span>':'<span class="badge badge-pending">未完了</span>'}${f.lastDone?`<div style="font-size:10px;color:var(--slate-light);">${f.lastDone}</div>`:''}</td>
      <td><div style="display:flex;gap:4px;">
        <button class="btn btn-outline btn-sm" onclick="editFacility('${f.id}')">編集</button>
        <button class="btn btn-forest btn-sm" onclick="markFacility('${f.id}','done')">完了</button>

      </div></td>
    </tr>`).join('')}</tbody></table></div>`;
}

function setGenreFilter(g) { state.filterGenre=g; renderFacilities(); }
function setAreaFilter(a) { state.filterArea=a; renderFacilities(); }

async function markFacility(id, status) {
  const lastDone = status==='done' ? state.today : null;
  await updateFacilityStatus(id, status, lastDone);
  const f = state.facilities.find(f=>f.id===id);
  if (f) { f.status=status; f.lastDone=lastDone; }
  renderFacilities();
}

async function saveFuelPrice() {
  const val = parseFloat(document.getElementById('fuelPriceInput').value);
  if (!val || val <= 0) { alert('正しい金額を入力してください'); return; }
  state.fuelPrice = val;
  // Supabaseのsettingsテーブルに保存（なければlocalStorageで代替）
  try {
    await sb.from('settings').upsert({key:'fuel_price', value:String(val)}, {onConflict:'key'});
  } catch(e) {
    localStorage.setItem('fuel_price', String(val));
  }
  document.getElementById('fuelPriceDisp').textContent = `現在の設定: ${val}円/L`;
  alert(`✅ 燃料単価を ${val}円/L に設定しました`);
}

async function loadFuelPrice() {
  try {
    const {data} = await sb.from('settings').select('value').eq('key','fuel_price').single();
    if (data) { state.fuelPrice = parseFloat(data.value) || 170; return; }
  } catch(e) {}
  const local = localStorage.getItem('fuel_price');
  if (local) state.fuelPrice = parseFloat(local) || 170;
}

  const zoneId = document.getElementById('sch_zone').value;

function handleRespond(btn) {

  const res = btn.getAttribute('data-res');
  respondSchedule(id, res);
}
async function respondSchedule(id, response) {
  await sb.from('schedules').update({response}).eq('id', id);
  const s = state.schedules.find(s=>s.id===id);
  if (s) s.response = response;
  await reloadSchedules();
  await addNotifDB(`📬 ${state.currentUser.name} が配達指示に「${response==='ok'?'対応可':'対応不可'}」と回答しました`, null);

  if (currentPage === 'availability') renderAvailability();
  else renderSchedule();
}

function renderDelivery() {
  const uid = state.currentUser.id;
  const staff = state.staff.find(s=>s.id===uid);
  const todaySched = state.schedules.find(s=>s.staffId===uid && s.date===state.today);
  const activeZone = todaySched?.zoneId || staff?.zone;
  const zoneFacs = state.facilities.filter(f => f.zone===activeZone && f.status!=='done');
  const todayDelivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);

  let html = '';
  if (!todayDelivery?.started) {
    html += `<div class="alert alert-info">本日の担当エリア: <strong>${AREA_NAMES[activeZone]||'未設定'}</strong> ／ 巡回施設: <strong>${zoneFacs.length}件</strong></div>
    <div style="display:flex;gap:12px;margin-bottom:20px;">
      <button class="btn btn-forest btn-lg" onclick="document.getElementById('startTime').value=new Date().toTimeString().slice(0,5);openModal('startDeliveryModal')">🚗 配達を開始する</button>
    </div>`;
  } else if (!todayDelivery?.ended) {
    const completed = (todayDelivery.reports||[]).filter(r=>r.status==='done').length;
    html += `<div class="alert alert-success">🚗 配達中 | 完了: <strong>${completed}</strong>/${zoneFacs.length}件
      <button class="btn btn-coral btn-sm" style="margin-left:12px;" onclick="document.getElementById('endTime').value=new Date().toTimeString().slice(0,5);openModal('endDeliveryModal')">🏁 配達終了</button>
    </div>`;
  } else {
    html += `<div class="alert alert-success">🏁 本日の配達完了！お疲れ様でした。</div>`;
  }
  html += `<div class="facilityList">${zoneFacs.map(f => {
    const rep = todayDelivery?.reports?.find(r=>r.facId===f.id);
    return `<div class="facilityCard ${rep ? (rep.status==='done'?'done':rep.status==='skip'?'skip':'pending') : ''}">
      <div class="fcTop">
        <div>
          <div class="fcName">${f.name}</div>
          <div class="fcMeta">
            <span class="fcTag">📍 ${f.area2||f.area1}</span>
            <span class="badge badge-area${f.zone}" style="font-size:10px;">${AREA_NAMES[f.zone]||''}</span>
            <span class="fcTag">🔧 ${f.rack}</span>
          </div>
          ${f.address?`<div class="fcTag" style="margin-top:4px;font-size:11px;">📮 ${f.address}</div>`:''}
        </div>
        ${rep ? `<div class="completeCheckAnim">${rep.status==='done'?'✓':rep.status==='skip'?'→':'✗'}</div>` : ''}
      </div>
      <div class="fcActions">
        <button class="btn btn-primary btn-sm" onclick="openCheckIn('${f.id}')">📝 報告</button>
        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((f.address||f.name)+' 沖縄')}" target="_blank" class="btn btn-outline btn-sm">🗺️ MAP</a>
      </div>
    </div>`;
  }).join('')}</div>`;
  document.getElementById('deliveryContent').innerHTML = html;
}

async function startDelivery() {
  const uid = state.currentUser.id;
  const startKm = document.getElementById('startKm').value;
  const startTime = document.getElementById('startTime').value;
  setBtn('startDelivBtn', true);
  const meterStartUrls = collectPhotoUrls('meterStartPhotos');
  const existing = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);
  if (existing) {
    await sb.from('deliveries').update({started:true, start_km:startKm, start_time:startTime, meter_start_photos:JSON.stringify(meterStartUrls)}).eq('id', existing.id);
  } else {
    await sb.from('deliveries').insert({id:'d'+Date.now(), staff_id:uid, date:state.today, started:true, ended:false, start_km:startKm, start_time:startTime, meter_start_photos:JSON.stringify(meterStartUrls)});
  }
  await sb.from('staff').update({online:true}).eq('id', uid);
  await addNotifDB(`🚗 ${state.currentUser.name} が配達を開始しました`, null);
  await reloadDeliveries();
  await reloadStaff();
  setBtn('startDelivBtn', false);
  closeModal('startDeliveryModal');
  renderDelivery();
}

async function endDelivery() {
  const uid = state.currentUser.id;
  const endKm = document.getElementById('endKm').value;
  const endTime = document.getElementById('endTime').value;
  setBtn('endDelivBtn', true);
  const meterEndUrls = collectPhotoUrls('meterEndPhotos');
  const tollUrls = collectPhotoUrls('tollPhotos');
  const delivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);
  if (delivery) {
    await sb.from('deliveries').update({ended:true, end_km:endKm, end_time:endTime, meter_end_photos:JSON.stringify(meterEndUrls), toll_photos:JSON.stringify(tollUrls)}).eq('id', delivery.id);
  }
  await sb.from('staff').update({online:false}).eq('id', uid);
  await addNotifDB(`🏁 ${state.currentUser.name} が配達を完了しました`, null);
  await reloadDeliveries();
  await reloadStaff();
  setBtn('endDelivBtn', false);
  closeModal('endDeliveryModal');
  renderDelivery();
}

function openCheckIn(facId) {
  state.checkInFacId = facId;
  state.checkInStatus = null;
  const f = state.facilities.find(f=>f.id===facId);
  document.getElementById('checkInTitle').textContent = `📝 ${f?.name||'施設'} 報告`;
  document.getElementById('checkInNote').value = '';
  document.getElementById('facilityContact').value = '';
  document.getElementById('statusSelected').textContent = '未選択';
  document.getElementById('rackPhotos').innerHTML = '';
  document.getElementById('receiptPhotos').innerHTML = '';
  // パンフ枚数リセット
  ['繁','日','英','簡'].forEach(lang => { const el = document.getElementById('pamph_'+lang); if(el) el.value='0'; });
  openModal('checkInModal');
}
function togglePamph(btn) {
  const selected = btn.dataset.selected === '1';
  if (selected) {
    btn.dataset.selected = '';
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-outline');
  } else {
    btn.dataset.selected = '1';
    btn.classList.remove('btn-outline');
    btn.classList.add('btn-primary');
  }
}
function setCheckInStatus(s) {
  state.checkInStatus = s;
  document.getElementById('statusSelected').textContent = {done:'✅ 補充完了',skip:'⏭️ 補充不要',pending:'❌ 未完了'}[s];
}
async function saveCheckIn() {
  if (!state.checkInStatus) { alert('補充状況を選択してください'); return; }
  setBtn('saveCheckInBtn', true);
  const uid = state.currentUser.id;
  let delivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today);
  if (!delivery) {
    const {data} = await sb.from('deliveries').insert({id:'d'+Date.now(), staff_id:uid, date:state.today, started:true, ended:false}).select().single();
    if (data) { await reloadDeliveries(); delivery = state.deliveries.find(d=>d.staffId===uid && d.date===state.today); }
  }
  if (!delivery) { setBtn('saveCheckInBtn', false); return; }
  const rackUrls = collectPhotoUrls('rackPhotos');
  const receiptUrls = collectPhotoUrls('receiptPhotos');
  const existingRep = delivery.reports?.find(r=>r.facId===state.checkInFacId);
  // 言語別パンフ枚数を収集（0枚以外のみ）
  const pamphDetail = {};
  ['繁','日','英','簡'].forEach(lang => {
    const val = parseInt(document.getElementById('pamph_'+lang)?.value || '0');
    if (val > 0) pamphDetail[lang] = val;
  });
  const totalPamphCount = Object.values(pamphDetail).reduce((a,b)=>a+b, 0);
  const facilityContact = document.getElementById('facilityContact').value;
  const repData = {
    status: state.checkInStatus,
    note: document.getElementById('checkInNote').value,
    rack_photos: JSON.stringify(rackUrls),
    receipt_photos: JSON.stringify(receiptUrls),
    pamph_types: JSON.stringify(Object.keys(pamphDetail)),
    pamph_count: totalPamphCount || null,
    facility_contact: facilityContact,
    pamph_detail: JSON.stringify(pamphDetail),
  };
  if (existingRep) {
    await sb.from('reports').update(repData).eq('id', existingRep.id);
  } else {
    await sb.from('reports').insert({id:'r'+Date.now(), delivery_id:delivery.id, fac_id:state.checkInFacId, ...repData});
  }
  // Update facility status
  const lastDone = state.checkInStatus==='done' ? state.today : null;
  await updateFacilityStatus(state.checkInFacId, state.checkInStatus, lastDone);
  // 施設完了通知を管理者へ送る
  const facName = state.facilities.find(f=>f.id===state.checkInFacId)?.name || state.checkInFacId;
  const pamphInfo = (() => { try { const d=JSON.parse(repData.pamph_detail||'{}'); const entries=Object.entries(d); return entries.length>0?entries.map(([k,v])=>`【${k}】${v}枚`).join(' '):''; } catch(e){return '';} })();
  if (state.checkInStatus === 'done') {
    await addNotifDB(`📦 ${state.currentUser.name} が「${facName}」の補充を完了しました${pamphInfo?` ${pamphInfo}`:''}`, null);
  } else if (state.checkInStatus === 'skip') {
    await addNotifDB(`⏭️ ${state.currentUser.name} が「${facName}」を補充不要と報告しました`, null);
  } else if (state.checkInStatus === 'pending') {
    await addNotifDB(`❌ ${state.currentUser.name} が「${facName}」を未完了と報告しました`, null);
  }
  await reloadFacilities();
  await reloadDeliveries();
  setBtn('saveCheckInBtn', false);
  closeModal('checkInModal');
  renderDelivery();
}

function renderRoute() {
  const isAdmin = state.currentUser.type === 'admin';
  let zoneId = isAdmin ? '1' : (state.staff.find(s=>s.id===state.currentUser.id)?.zone || '1');
  const sel = document.getElementById('routeZoneSelect');
  if (sel) zoneId = sel.value || zoneId;
  const facs = state.facilities.filter(f=>f.zone===zoneId && f.status!=='done');
  document.getElementById('routeContent').innerHTML = `
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
        <div class="formGroup">
          <label class="formLabel">エリア選択</label>
          <select class="formSelect" id="routeZoneSelect" onchange="renderRoute()">
            ${[1,2,3,4,5].map(z=>`<option value="${z}" ${zoneId===String(z)?'selected':''}>${AREA_NAMES[z]}</option>`).join('')}
          </select>
        </div>
        <a href="${buildGoogleMapsUrl(facs)}" target="_blank" class="btn btn-primary">🗺️ Googleマップで開く</a>
      </div>
    </div>
    <div class="card">
      <div class="cardTitle">📍 巡回ルート（未完了施設 ${facs.length}件）</div>
      <div class="routeList">${facs.map((f,i) => `
        <div class="routeItem">
          <div class="routeLine">
            <div class="routeDot" style="background:${i===0?'var(--forest)':i===facs.length-1?'var(--coral)':'var(--ocean)'}"></div>
            ${i<facs.length-1?'<div class="routeConnector"></div>':''}
          </div>
          <div class="routeInfo">
            <div class="routeName">${i+1}. ${f.name}</div>
            <div class="routeAddr">${f.address||f.area2||''} · <span class="badge badge-area${f.zone}" style="font-size:10px;">${AREA_NAMES[f.zone]||''}</span></div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
}
function buildGoogleMapsUrl(facs) {
  if (!facs.length) return 'https://maps.google.com';
  const addrs = facs.slice(0,10).map(f=>encodeURIComponent(f.address||f.name));
  if (addrs.length===1) return `https://www.google.com/maps/search/?api=1&query=${addrs[0]}`;
  const waypoints = addrs.slice(1,-1).join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${addrs[0]}&destination=${addrs[addrs.length-1]}`;
  if (waypoints) url += `&waypoints=${waypoints}`;
  return url;
}

function renderReports() {
  const uid = state.currentUser.id;
  const isAdmin = state.currentUser.type === 'admin';
  const deliveries = isAdmin ? state.deliveries : state.deliveries.filter(d=>d.staffId===uid);

          <div class="infoRow"><span class="infoLabel">燃料費</span><span class="infoVal">${fuelCost>0?'¥'+fuelCost.toLocaleString():'-'}</span></div>

        </div>
        ${(() => {
          const mStart = (() => { try { return JSON.parse(d.meter_start_photos||'[]'); } catch(e){ return []; } })();
          const mEnd = (() => { try { return JSON.parse(d.meter_end_photos||'[]'); } catch(e){ return []; } })();
          const toll = (() => { try { return JSON.parse(d.toll_photos||'[]'); } catch(e){ return []; } })();
          const photoSection = (label, urls) => urls.length ? `<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:600;color:var(--slate-mid);margin-bottom:4px;">${label}</div><div style="display:flex;gap:6px;flex-wrap:wrap;">${urls.map(u=>`<a href="${u}" target="_blank"><img src="${u}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0;"></a>`).join('')}</div></div>` : '';
          const sections = photoSection('📸 開始メーター', mStart) + photoSection('📸 終了メーター', mEnd) + photoSection('🧾 領収書', toll);
          return sections ? `<div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:8px;">${sections}</div>` : '';

function buildReportTable(reports, genre) {
  const filtered = reports.filter(r => { const f=state.facilities.find(f=>f.id===r.facId); return genre==='all'||f?.genre===genre; });
  if (!filtered.length) return '<p style="color:var(--slate-light);font-size:13px;padding:12px;">なし</p>';
  return `<table><thead><tr><th>施設名</th><th>ジャンル</th><th>エリア</th><th>状況</th><th>パンフ</th><th>枚数</th><th>担当者</th><th>メモ</th><th>写真</th></tr></thead><tbody>${filtered.map(r=>{
    const f=state.facilities.find(f=>f.id===r.facId);
    const rackPhotos = (() => { try { return JSON.parse(r.rack_photos||'[]'); } catch(e){ return []; } })();
    const receiptPhotos = (() => { try { return JSON.parse(r.receipt_photos||'[]'); } catch(e){ return []; } })();
    const allPhotos = [...rackPhotos, ...receiptPhotos];
    const photoHtml = allPhotos.length > 0
      ? `<div style="display:flex;gap:4px;flex-wrap:wrap;">${allPhotos.map(url=>`<a href="${url}" target="_blank"><img src="${url}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid #e2e8f0;"></a>`).join('')}</div>`
      : '<span style="color:#94a3b8;font-size:11px;">なし</span>';
    const pamphDetail = (() => { try { return JSON.parse(r.pamph_detail||'{}'); } catch(e){ return {}; } })();
    const pamphEntries = Object.entries(pamphDetail);
    const pamphHtml = pamphEntries.length>0 ? pamphEntries.map(([k,v])=>`<span class="badge badge-skip" style="font-size:10px;">【${k}】${v}枚</span>`).join(' ') : (r.pamph_count ? `${r.pamph_count}枚` : '-');
    return `<tr><td style="font-weight:600;">${f?.name||r.facId}</td><td style="font-size:12px;">${{hotel:'🏨',rental:'🚗',michi:'🌳'}[f?.genre]||''}</td><td><span class="badge badge-area${f?.zone||'1'}">${AREA_NAMES[f?.zone]||''}</span></td><td><span class="badge ${r.status==='done'?'badge-done':r.status==='skip'?'badge-skip':'badge-pending'}">${r.status==='done'?'完了':r.status==='skip'?'不要':'未完了'}</span></td><td>${pamphHtml}</td><td style="font-size:12px;">${r.facility_contact||'-'}</td><td style="font-size:12px;color:var(--slate-mid);">${r.note||'-'}</td><td>${photoHtml}</td></tr>`;
  }).join('')}</tbody></table>`;
}
function filterReport(delivId, genre, btn) {
  btn.closest('div').querySelectorAll('.genreTab').forEach(t=>t.classList.remove('active'));

  document.getElementById(`reportFacs_${delivId}`).innerHTML = buildReportTable(d?.reports||[], genre);

// カレンダー表示中の年月を保持
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth();

function calPrev() {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderAvailability();
}
function calNext() {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderAvailability();
}

function renderAvailability() {
  const uid = state.currentUser.id;
  const av = state.availability[uid] || {};
  const year = calViewYear, month = calViewMonth;
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const days = ['日','月','火','水','木','金','土'];
  let calHtml = `<div class="calHeader">${days.map(d=>`<div class="calDayLabel">${d}</div>`).join('')}</div><div class="calGrid">`;
  for (let i=0;i<firstDay;i++) calHtml+='<div></div>';
  for (let d=1;d<=daysInMonth;d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds===state.today, val = av[ds];
    calHtml += `<div class="calDay ${isToday?'today':val==='available'?'available':val==='unavailable'?'unavailable':''}" onclick="toggleAvail('${ds}')">${d}</div>`;
  }
  calHtml += '</div>';
  const myScheds = state.schedules.filter(s=>s.staffId===uid).sort((a,b)=>a.date>b.date?1:-1);
  document.getElementById('availContent').innerHTML = `
    <div class="twoCol">
      <div class="card">
        <div class="cardTitle">📆 出勤可能日</div>
        <div class="alert alert-info" style="margin-bottom:12px;">タップして 🟢 出勤可 ／ 🔴 不可 を切り替え</div>
        <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--forest);"></div>出勤可</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--coral);"></div>不可</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--ocean);"></div>今日</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <button class="btn btn-outline btn-sm" onclick="calPrev()">◀ 前月</button>
          <span style="font-weight:700;font-size:15px;">${year}年${month+1}月</span>
          <button class="btn btn-outline btn-sm" onclick="calNext()">次月 ▶</button>
        </div>
        ${calHtml}
      </div>
      <div class="card">
        <div class="cardTitle">📋 配達指示</div>
        ${myScheds.length===0 ? '<p style="color:var(--slate-light);font-size:13px;">配達指示なし</p>' :
        '<div class="facilityList">' + myScheds.map(s => {
          const responseBtn = !s.response ? `<div class="fcActions"><button class="btn btn-forest btn-sm" data-id="${s.id}" data-res="ok" onclick="handleRespond(this)">✅ 対応可</button><button class="btn btn-coral btn-sm" data-id="${s.id}" data-res="ng" onclick="handleRespond(this)">❌ 対応不可</button></div>` : '';
          return `<div class="facilityCard ${s.response==='ok'?'done':s.response==='ng'?'pending':''}"><div class="fcTop"><div><div class="fcName">📅 ${s.date}</div><div class="fcMeta"><span class="badge badge-area${s.zoneId}">${AREA_NAMES[s.zoneId]||''}</span></div></div><span class="badge ${s.response==='ok'?'badge-done':s.response==='ng'?'badge-pending':'badge-skip'}">${s.response==='ok'?'対応可':s.response==='ng'?'対応不可':'未回答'}</span></div>${responseBtn}</div>`;
        }).join('') + '</div>'}
      </div>
    </div>`;
}
async function toggleAvail(dateStr) {
  const uid = state.currentUser.id;
  const staff = state.staff.find(s=>s.id===uid);
  if (!state.availability[uid]) state.availability[uid] = {};
  const cur = state.availability[uid][dateStr];
  const next = cur==='available' ? 'unavailable' : cur==='unavailable' ? '' : 'available';
  state.availability[uid][dateStr] = next;
  await sb.from('availability').upsert({id:`${uid}_${dateStr}`, staff_id:uid, date:dateStr, value:next}, {onConflict:'staff_id,date'});

  if (next === 'available') {
    // 通知を管理者へ送る
    await addNotifDB(`📅 ${state.currentUser.name} が ${dateStr} を出勤可能日に登録しました`, null);
    // スケジュール一覧に自動追加（まだ同じ日付・担当者のスケジュールがなければ）
    const alreadyExists = state.schedules.find(s => s.staffId === uid && s.date === dateStr);
    if (!alreadyExists) {
      const newSched = {
        id: 'sc' + Date.now(),
        staff_id: uid,
        date: dateStr,
        zone_id: staff?.zone || '1',
        note: '📅 担当者より出勤可能日の申告',
        response: 'ok'
      };
      await sb.from('schedules').insert(newSched);
      await reloadSchedules();
    }
  } else if (next === 'unavailable') {
    await addNotifDB(`📅 ${state.currentUser.name} が ${dateStr} を出勤不可に変更しました`, null);
    // 自動追加したスケジュールがあれば削除
    const toDelete = state.schedules.find(s => s.staffId === uid && s.date === dateStr && s.note === '📅 担当者より出勤可能日の申告');
    if (toDelete) {
      await sb.from('schedules').delete().eq('id', toDelete.id);
      await reloadSchedules();
    }
  } else {
    // 空（取り消し）→ 自動追加スケジュールも削除
    const toDelete = state.schedules.find(s => s.staffId === uid && s.date === dateStr && s.note === '📅 担当者より出勤可能日の申告');
    if (toDelete) {
      await sb.from('schedules').delete().eq('id', toDelete.id);
      await reloadSchedules();
    }
  }
  renderAvailability();
}

// ============================================================
// UTILS
// ============================================================
// ============================================================
// RESET FUNCTIONS (Admin only)
// ============================================================
async function confirmReset(type) {
  const labels = {
    today: '本日（' + state.today + '）の配達記録・通知をリセット',
    facilities: '全ての配布完了施設を「未完了」に戻す',
    all: '本日の記録 ＋ 配布完了施設を全てリセット',
  };
  if (!confirm(`【確認】

${labels[type]}

よろしいですか？
※ この操作は取り消せません`)) return;

  showLoading('リセット中...');
  try {
    if (type === 'today' || type === 'all') {
      // 今日のreports削除
      const todayDelivIds = state.deliveries.filter(d => d.date === state.today).map(d => d.id);
      if (todayDelivIds.length > 0) {
        await sb.from('reports').delete().in('delivery_id', todayDelivIds);
      }
      // 今日のdeliveries削除
      await sb.from('deliveries').delete().eq('date', state.today);
      // 今日の通知削除
      await sb.from('notifications').delete().gte('created_at', state.today + 'T00:00:00');
      // 今日完了になった施設を未完了に戻す
      await sb.from('facilities').update({status:'pending', last_done:null}).eq('last_done', state.today);
      // 全スタッフをオフラインに
      await sb.from('staff').update({online:false});
    }
    if (type === 'facilities' || type === 'all') {
      // 全配布完了施設を未完了に
      await sb.from('facilities').update({status:'pending', last_done:null}).eq('status','done');
    }
    await loadAllData();
    await loadFuelPrice();
    hideLoading();
    alert('✅ リセット完了しました！');
    renderDashboard();
  } catch(e) {
    hideLoading();
    console.error('reset error:', e);
    alert('エラーが発生しました。もう一度お試しください。');
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
// Supabase Storageに写真をアップロードしてURLを返す
async function uploadPhotoToStorage(file, folder) {
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const { data, error } = await sb.storage.from('photo').upload(path, file, { upsert: true });
  if (error) { console.error('upload error:', error); return null; }
  const { data: urlData } = sb.storage.from('photo').getPublicUrl(path);
  return urlData.publicUrl;
}

function addPhoto(input, containerId) {
  const container = document.getElementById(containerId);
  Array.from(input.files).forEach(async file => {
    // まずプレビューを即座に表示
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement('div');
      div.className = 'photoThumb';
      div.setAttribute('data-uploading', 'true');
      div.innerHTML = `<img src="${e.target.result}" alt="photo"><div style="position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;">uploading...</div>`;
      container.appendChild(div);
      // Storageにアップロード
      const folder = state.currentUser?.id || 'unknown';
      uploadPhotoToStorage(file, folder).then(url => {
        if (url) {
          div.setAttribute('data-url', url);
          div.setAttribute('data-uploading', 'false');
          div.innerHTML = `<img src="${url}" alt="photo"><button class="del" onclick="this.parentElement.remove()">✕</button>`;
        } else {
          div.innerHTML = `<img src="${e.target.result}" alt="photo"><button class="del" onclick="this.parentElement.remove()">✕</button>`;
        }
      });
    };
    reader.readAsDataURL(file);
  });
}

// コンテナ内の写真URLを収集
function collectPhotoUrls(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return [];
  return Array.from(container.querySelectorAll('.photoThumb[data-url]'))
    .map(el => el.getAttribute('data-url'))
    .filter(Boolean);
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target===el) el.classList.remove('open'); });
});
